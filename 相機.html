<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧美顏相機網頁系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        
        /* 1. 介紹頁面板樣式 */
        .intro-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 600px; height: 80vh; border: 1px solid #ddd; border-radius: 12px; background: #fff; padding: 20px; }
        .intro-title { font-size: 32px; font-weight: bold; margin-bottom: 40px; color: #000; text-align: center; }
        .start-btn { background-color: #8e8e8e; color: #000; border: 2px solid #000; padding: 15px 50px; font-size: 22px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .start-btn:hover { background-color: #7a7a7a; }

        /* 2. 拍照階段主容器 */
        .camera-stage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 1000px; }
        .countdown-overlay { font-size: 26px; font-weight: bold; color: #000; margin-bottom: 15px; min-height: 40px; text-align: center; width: 100%; transition: color 0.3s; }
        .countdown-overlay.warning { color: #ff3b30; } 
        
        /* 雙視窗外層：預設（電腦端）為左右並排橫向 */
        .viewfinders { display: flex; flex-direction: row; gap: 20px; width: 100%; justify-content: center; margin-bottom: 20px; }
        
        /* 視窗盒子：電腦端固定比例，設定為寬高比 4:5 的矩形 */
        .viewfinder-box { width: 420px; height: 500px; background-color: #8e8e8e; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-size: 28px; font-weight: bold; position: relative; overflow: hidden; }
        
        /* 關鍵：透過 CSS 的 object-fit: cover 裁剪填滿，不論畫布比例如何改變，人都絕對不會變形 */
        .viewfinder-box canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder-label { position: absolute; z-index: 10; pointer-events: none; text-align: center; width: 90%; text-shadow: 0px 0px 6px rgba(255,255,255,0.9); font-size: 24px; color: #000; }
        
        /* 【重要升級】：手機與平板響應式（RWD）斷點設定 */
        @media (max-width: 850px) or (orientation: portrait) {
            body { padding: 5px; }
            .camera-stage { width: 100%; height: calc(100vh - 30px); justify-content: space-between; }
            .countdown-overlay { font-size: 20px; margin-bottom: 5px; min-height: 30px; }
            
            /* 行動端：強制改為上下垂直排列，並填滿可用高度 */
            .viewfinders { flex-direction: column; gap: 10px; flex: 1; height: 60vh; margin-bottom: 10px; }
            
            /* 行動端：讓兩個鏡頭各自佔據上半部與下半部 */
            .viewfinder-box { width: 100%; flex: 1; height: auto; }
            .viewfinder-label { font-size: 18px; }
            .viewfinder-label span { font-size: 12px !important; }
            
            .filter-scroller-container { margin-bottom: 5px; padding: 10px; }
            .filter-thumb-canvas { width: 80px; height: 90px; }
            .filter-item-box { flex: 0 0 80px; }
            .filter-thumb-name { font-size: 12px; }
        }

        /* 1.1 濾鏡動態滾動欄 */
        .filter-scroller-container { width: 100%; background: #f2f2f7; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .filter-scroller-title { font-size: 16px; font-weight: bold; color: #3a3a3c; padding-left: 5px; }
        .filter-scroller { display: flex; gap: 12px; overflow-x: auto; width: 100%; padding-bottom: 5px; scroll-behavior: smooth; }
        .filter-scroller::-webkit-scrollbar { height: 6px; }
        .filter-scroller::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 3px; }
        .filter-item-box { flex: 0 0 100px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .filter-thumb-canvas { width: 100px; height: 110px; background: #8e8e8e; border-radius: 8px; object-fit: cover; border: 3px solid transparent; transition: border 0.2s; }
        .filter-item-box.active .filter-thumb-canvas { border-color: #0071e3; }
        .filter-thumb-name { font-size: 14px; font-weight: bold; color: #000; text-align: center; }

        /* 3. 後製階段通用樣式 */
        .edit-stage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
        .preview-box { width: 100%; max-width: 500px; aspect-ratio: 1/1; background-color: #8e8e8e; border-radius: 12px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .preview-box canvas { width: 100%; height: 100%; object-fit: cover; }
        .edit-label { position: absolute; bottom: 15px; left: 15px; background-color: #8e8e8e; padding: 8px 25px; border-radius: 10px; font-size: 22px; font-weight: bold; color: #000; z-index: 5; }
        
        .menu-row { display: flex; gap: 15px; justify-content: center; width: 100%; margin-bottom: 20px; }
        .btn-item { width: 85px; height: 60px; background-color: #8e8e8e; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; border: none; }
        .btn-item.active { background-color: #555555; color: #fff; }
        
        .sub-panel { width: 100%; display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .slider-container { width: 100%; padding: 0 20px; margin: 15px 0; }
        .slider-input { width: 100%; height: 6px; background: #000; outline: none; -webkit-appearance: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #000; cursor: pointer; }
        
        .grid-layout { display: flex; gap: 10px; justify-content: flex-start; flex-wrap: wrap; width: 100%; padding: 0 10px; }
        .grid-item { width: 75px; height: 75px; background-color: #8e8e8e; border-radius: 12px; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; }
        .confirm-btn { align-self: flex-end; width: 60px; height: 60px; background-color: #8e8e8e; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; margin-top: 10px; margin-right: 10px; }
        
        #hidden-video { display: none; }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay playsinline muted></video>

    <div id="stage-intro" class="intro-stage">
        <div class="intro-title">用法.網頁功能介紹</div>
        <button class="start-btn" onclick="enterCameraStage()">開始體驗</button>
    </div>

    <div id="stage-capture" class="camera-stage">
        <div id="countdown" class="countdown-overlay">比 OK 倒數 5 秒拍照</div>
        
        <div class="viewfinders">
            <div class="viewfinder-box">
                <span class="viewfinder-label" style="top: 15px;">原鏡頭</span>
                <canvas id="canvas-raw"></canvas>
            </div>
            <div class="viewfinder-box">
                <span class="viewfinder-label" style="top: 15px;">修圖後<br><span style="font-size:14px; font-weight:normal; line-height: 1.4;">(揮手切換濾鏡.比YA黃金比例輔助.第2次YA取消)</span></span>
                <canvas id="canvas-live-fx"></canvas>
            </div>
        </div>
        
        <div class="filter-scroller-container">
            <div class="filter-scroller-title">智慧即時濾鏡</div>
            <div class="filter-scroller" id="filterScroller"></div>
        </div>
    </div>

    <div id="stage-edit" class="edit-stage">
        <div class="preview-box">
            <canvas id="canvas-edit-preview"></canvas>
            <div id="current-edit-label" class="edit-label" style="display:none;">美白</div>
        </div>
        
        <div class="menu-row" id="main-edit-menu">
            <button class="btn-item" onclick="openSubPanel('whiten')">美白</button>
            <button class="btn-item" onclick="openSubPanel('smooth')">磨皮</button>
            <button class="btn-item" onclick="openSubPanel('makeup')">妝容</button>
            <button class="btn-item" onclick="openSubPanel('sticker')">貼紙</button>
        </div>

        <div id="panel-whiten" class="sub-panel">
            <div class="slider-container">
                <input type="range" id="slider-whiten" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
        </div>

        <div id="panel-smooth" class="sub-panel">
            <div class="slider-container">
                <input type="range" id="slider-smooth" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
        </div>

        <div id="panel-makeup" class="sub-panel">
            <div class="grid-layout">
                <button class="grid-item" onclick="setMakeup('korean')">韓系</button>
                <button class="grid-item" onclick="setMakeup('japanese')">日系</button>
                <button class="grid-item" onclick="setMakeup('taiwanese')">歌仔戲</button>
                <button class="grid-item" onclick="setMakeup('european')">歐式</button>
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
        </div>

        <div id="panel-sticker" class="sub-panel">
            <div class="grid-layout">
                <button class="grid-item" onclick="setSticker('glasses')">
                    <svg width="50" height="30" viewBox="0 0 100 40"><circle cx="25" cy="20" r="14" stroke="black" stroke-width="2.5" fill="none"/><circle cx="75" cy="20" r="14" stroke="black" stroke-width="2.5" fill="none"/><line x1="39" y1="20" x2="61" y2="20" stroke="black" stroke-width="2.5"/></svg>
                </button>
                <button class="grid-item" onclick="setSticker('ears')">
                    <svg width="50" height="40" viewBox="0 0 100 60"><polygon points="15,50 35,15 50,45" fill="#ffccd5" stroke="black" stroke-width="2"/><polygon points="50,45 65,15 85,50" fill="#ffccd5" stroke="black" stroke-width="2"/></svg>
                </button>
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasRaw = document.getElementById('canvas-raw');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');
        
        const ctxRaw = canvasRaw.getContext('2d');
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let currentFilterIndex = 0;
        const filters = ['無', '復古明亮', '浪漫粉紅', '冷調青翠', '高級灰調', '日系清新', '溫慢陽光', '經典黑白', '戲劇張力', '極光幻彩', '暮色暖橘'];
        
        let showGoldenRatio = false; 
        let lastYaTime = 0;          
        let isCountingDown = false;  
        let capturedBlobImage = null;

        let currentMakeup = 'none';
        let currentSticker = 'none';
        let faceLandmarksData = null; 
        let isFrontFace = false;

        // 為了支援彈性排版，這裡將內部解析度固定提高，外部大小交給 CSS 控制
        function initCanvasSize() {
            [canvasRaw, canvasLiveFx, canvasEdit].forEach(canvas => {
                canvas.width = 480;
                canvas.height = 600;
            });
        }
        initCanvasSize();

        function createFilterThumbnails() {
            const scroller = document.getElementById('filterScroller');
            scroller.innerHTML = '';
            filters.forEach((filterName, index) => {
                const itemBox = document.createElement('div');
                itemBox.className = `filter-item-box ${index === currentFilterIndex ? 'active' : ''}`;
                itemBox.id = `filter-item-${index}`;
                itemBox.onclick = () => selectFilter(index);

                const canvas = document.createElement('canvas');
                canvas.className = 'filter-thumb-canvas';
                canvas.width = 100;
                canvas.height = 110;

                const nameLabel = document.createElement('div');
                nameLabel.className = 'filter-thumb-name';
                nameLabel.innerText = filterName;

                itemBox.appendChild(canvas);
                itemBox.appendChild(nameLabel);
                scroller.appendChild(itemBox);
            });
        }
        createFilterThumbnails();

        function selectFilter(index) {
            currentFilterIndex = index;
            document.querySelectorAll('.filter-item-box').forEach((box, i) => {
                if(i === index) box.classList.add('active');
                else box.classList.remove('active');
            });
            const activeBox = document.getElementById(`filter-item-${index}`);
            if (activeBox) activeBox.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function enterCameraStage() {
            document.getElementById('stage-intro').style.display = 'none';
            document.getElementById('stage-capture').style.display = 'flex';

            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        startBaseCameraLoop();
                        initMediaPipeAI();
                    });
                })
                .catch(err => {
                    document.getElementById('countdown').innerText = "鏡頭開啟失敗";
                    alert("無法獲取相機權限：" + err);
                });
        }

        function startBaseCameraLoop() {
            const render = () => {
                if (videoElement.readyState >= 2) {
                    ctxRaw.drawImage(videoElement, 0, 0, canvasRaw.width, canvasRaw.height);
                    
                    if (showGoldenRatio && faceLandmarksData && isFrontFace) {
                        drawWarpedGoldenRatioFace(ctxLive, videoElement, faceLandmarksData);
                    } else {
                        ctxLive.drawImage(videoElement, 0, 0, canvasLiveFx.width, canvasLiveFx.height);
                    }
                    applyLiveFilter(ctxLive, filters[currentFilterIndex]);

                    filters.forEach((filterName, index) => {
                        const itemBox = document.getElementById(`filter-item-${index}`);
                        if (itemBox) {
                            if (index === currentFilterIndex) itemBox.classList.add('active');
                            else itemBox.classList.remove('active');
                            
                            const thumbCanvas = itemBox.querySelector('canvas');
                            const tCtx = thumbCanvas.getContext('2d');
                            tCtx.drawImage(videoElement, 0, 0, thumbCanvas.width, thumbCanvas.height);
                            applyLiveFilter(tCtx, filterName);
                        }
                    });
                }
                requestAnimationFrame(render);
            };
            requestAnimationFrame(render);
        }

        let handsAI = null; let faceMeshAI = null;
        function initMediaPipeAI() {
            handsAI = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}` });
            handsAI.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
            handsAI.onResults(onHandResults);

            faceMeshAI = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}` });
            faceMeshAI.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
            faceMeshAI.onResults(onFaceResults);

            let isProcessing = false;
            setInterval(async () => {
                if (videoElement.readyState >= 2 && !isProcessing) {
                    isProcessing = true;
                    try {
                        await handsAI.send({ image: videoElement });
                        await faceMeshAI.send({ image: videoElement });
                    } catch (e) {}
                    isProcessing = false;
                }
            }, 90);
        }

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;
            const landmarks = results.multiHandLandmarks[0];
            const now = Date.now();

            if (detectWaveGesture(landmarks, now)) manualNextFilter();
            
            if (detectVSign(landmarks) && (now - lastYaTime > 2000)) {
                lastYaTime = now;
                
                if (!showGoldenRatio) {
                    if (!faceLandmarksData || !isFrontFace) {
                        const timerEl = document.getElementById('countdown');
                        timerEl.innerText = "⚠️ 偵測不到人物正臉，請正對鏡頭再試一次";
                        timerEl.classList.add('warning');
                        setTimeout(() => { 
                            timerEl.innerText = isCountingDown ? timerEl.innerText : "比 OK 倒數 5 秒拍照"; 
                            timerEl.classList.remove('warning');
                        }, 3000);
                        return; 
                    }
                    showGoldenRatio = true;
                } else {
                    showGoldenRatio = false; 
                }
            }
            if (detectOKGesture(landmarks) && !isCountingDown) startPhotoCountdown();
        }

        function onFaceResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                faceLandmarksData = landmarks;

                const leftEye = landmarks[33];
                const rightEye = landmarks[263];
                const noseTip = landmarks[1];
                
                const eyeDist = Math.abs(rightEye.x - leftEye.x);
                const noseLeftDist = Math.abs(noseTip.x - leftEye.x);
                const faceRatio = noseLeftDist / eyeDist;

                if (faceRatio < 0.38 || faceRatio > 0.62 || Math.abs(rightEye.y - leftEye.y) > 0.06) {
                    isFrontFace = false;
                    if(showGoldenRatio) { 
                        showGoldenRatio = false; 
                        document.getElementById('countdown').innerText = "⚠️ 請正對鏡頭以維持黃金比例結構";
                        document.getElementById('countdown').classList.add('warning');
                    }
                } else {
                    isFrontFace = true;
                }
            } else {
                faceLandmarksData = null;
                isFrontFace = false;
            }
        }

        function drawWarpedGoldenRatioFace(ctx, video, landmarks) {
            const w = canvasLiveFx.width;
            const h = canvasLiveFx.height;
            ctx.drawImage(video, 0, 0, w, h);

            const nTip = { x: landmarks[1].x * w, y: landmarks[1].y * h };       
            const lEye = { x: landmarks[33].x * w, y: landmarks[33].y * h };     
            const rEye = { x: landmarks[263].x * w, y: landmarks[263].y * h };   
            const mCenter = { x: landmarks[13].x * w, y: landmarks[13].y * h };  
            const chin = { x: landmarks[152].x * w, y: landmarks[152].y * h };   
            const forehead = { x: landmarks[10].x * w, y: landmarks[10].y * h }; 

            const currentFaceHeight = chin.y - forehead.y;
            const currentFaceWidth = (landmarks[454].x - landmarks[234].x) * w;

            const idealEyeSpacing = currentFaceWidth * 0.44; 

            const targetLEye = { x: nTip.x - idealEyeSpacing/2, y: forehead.y + currentFaceHeight * 0.42 };
            const targetREye = { x: nTip.x + idealEyeSpacing/2, y: forehead.y + currentFaceHeight * 0.42 };
            const targetLip = { x: nTip.x, y: forehead.y + currentFaceHeight * 0.76 };
            const targetChin = { x: nTip.x, y: forehead.y + currentFaceHeight * 0.98 };

            const warpZone = (srcX, srcY, tgtX, tgtY, r) => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(tgtX, tgtY, r, 0, Math.PI * 2);
                ctx.clip(); 
                ctx.drawImage(video, srcX - r, srcY - r, r*2, r*2, tgtX - r, tgtY - r, r*2, r*2);
                ctx.restore();
            };

            warpZone(lEye.x, lEye.y, targetLEye.x, targetLEye.y, currentFaceWidth * 0.22);
            warpZone(rEye.x, rEye.y, targetREye.x, targetREye.y, currentFaceWidth * 0.22);
            warpZone(mCenter.x, mCenter.y, targetLip.x, targetLip.y, currentFaceWidth * 0.25);
            warpZone(chin.x, chin.y, targetChin.x, targetChin.y, currentFaceWidth * 0.3);
        }

        let lastHandX = null; let lastWaveTime = 0;
        function detectWaveGesture(landmarks, now) {
            const wristX = landmarks[0].x;
            if (lastHandX === null) { lastHandX = wristX; return false; }
            const diff = wristX - lastHandX; lastHandX = wristX;
            if (Math.abs(diff) > 0.08) {
                if (now - lastWaveTime < 1000) { lastWaveTime = now; return true; }
                lastWaveTime = now;
            }
            return false;
        }
        function detectVSign(landmarks) {
            return (landmarks[8].y < landmarks[6].y && landmarks[12].y < landmarks[10].y && landmarks[16].y > landmarks[14].y && landmarks[20].y > landmarks[18].y);
        }
        function detectOKGesture(landmarks) {
            const dist = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
            return (dist < 0.04 && landmarks[12].y < landmarks[10].y && landmarks[16].y < landmarks[14].y);
        }

        function manualNextFilter() {
            const nextIndex = (currentFilterIndex + 1) % filters.length;
            selectFilter(nextIndex);
        }

        function startPhotoCountdown() {
            isCountingDown = true;
            let counter = 5;
            const timerEl = document.getElementById('countdown');
            timerEl.classList.remove('warning');
            
            const interval = setInterval(() => {
                counter--;
                if (counter > 0) {
                    timerEl.innerText = `倒數 ${counter} 秒...`;
                } else {
                    clearInterval(interval);
                    timerEl.innerText = "💥 拍照！";
                    setTimeout(() => { takeSnapshot(); }, 200);
                }
            }, 1000);
        }

        function takeSnapshot() {
            capturedBlobImage = document.createElement('canvas');
            capturedBlobImage.width = canvasLiveFx.width;
            capturedBlobImage.height = canvasLiveFx.height;
            capturedBlobImage.getContext('2d').drawImage(canvasLiveFx, 0, 0);

            document.getElementById('stage-capture').style.display = 'none';
            document.getElementById('stage-edit').style.display = 'flex';
            openSubPanel('whiten');
        }

        function applyLiveFilter(ctx, filterName) {
            const imgData = ctx.getImageData(0, 0, ctx.canvas.width, ctx.canvas.height);
            const d = imgData.data;
            switch(filterName) {
                case '復古明亮': for (let i=0; i<d.length; i+=4) { d[i]*=1.2; d[i+1]*=1.1; d[i+2]*=0.9; } break;
                case '浪漫粉紅': for (let i=0; i<d.length; i+=4) { d[i]+=30; d[i+2]+=15; } break;
                case '冷調青翠': for (let i=0; i<d.length; i+=4) { d[i+1]+=20; d[i+2]+=25; } break;
                case '高級灰調': for (let i=0; i<d.length; i+=4) { let v=d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11; d[i]=d[i]*0.6+v*0.4; d[i+1]=d[i+1]*0.6+v*0.4; d[i+2]=d[i+2]*0.6+v*0.4; } break;
                case '經典黑白': for (let i=0; i<d.length; i+=4) { let v=d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11; d[i]=v; d[i+1]=v; d[i+2]=v; } break;
                case '溫慢陽光': for (let i=0; i<d.length; i+=4) { d[i]+=25; d[i+1]+=15; d[i+2]-=10; } break;
                case '日系清新': for (let i=0; i<d.length; i+=4) { d[i]=Math.min(255,d[i]*1.1+10); d[i+1]=Math.min(255,d[i+1]*1.1+15); d[i+2]=Math.min(255,d[i+2]*1.05+20); } break;
                case '戲劇張力': for (let i=0; i<d.length; i+=4) { d[i]=d[i]>128?d[i]*1.1:d[i]*0.9; d[i+1]=d[i+1]>128?d[i+1]*1.1:d[i+1]*0.9; } break;
                case '極光幻彩': for (let i=0; i<d.length; i+=4) { d[i]=d[i+1]; d[i+2]=d[i]*0.85; } break;
                case '暮色暖橘': for (let i=0; i<d.length; i+=4) { d[i]+=35; d[i+1]+=10; d[i+2]-=15; } break;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function openSubPanel(type) {
            document.querySelectorAll('.sub-panel').forEach(p => p.style.display = 'none');
            const labelEl = document.getElementById('current-edit-label');
            labelEl.style.display = 'block';
            
            if (type === 'whiten') { labelEl.innerText = '美白'; document.getElementById('panel-whiten').style.display = 'flex'; }
            if (type === 'smooth') { labelEl.innerText = '磨皮'; document.getElementById('panel-smooth').style.display = 'flex'; }
            if (type === 'makeup') { labelEl.innerText = '妝容'; document.getElementById('panel-makeup').style.display = 'flex'; }
            if (type === 'sticker') { labelEl.innerText = '貼紙'; document.getElementById('panel-sticker').style.display = 'flex'; }
            
            applyEditEffects();
        }

        function setMakeup(style) { currentMakeup = style; applyEditEffects(); }
        function setSticker(type) { currentSticker = type; applyEditEffects(); }

        function applyEditEffects() {
            if (!capturedBlobImage) return;
            ctxEdit.drawImage(capturedBlobImage, 0, 0);

            const whitenVal = document.getElementById('slider-whiten').value;
            const smoothVal = document.getElementById('slider-smooth').value;
            const imgData = ctxEdit.getImageData(0, 0, canvasEdit.width, canvasEdit.height);
            const d = imgData.data;
            
            let wOffset = (whitenVal / 100) * 45;
            let sOffset = (smoothVal / 100);

            for (let i = 0; i < d.length; i += 4) {
                d[i] = Math.min(255, d[i] + wOffset);
                d[i+1] = Math.min(255, d[i+1] + wOffset);
                d[i+2] = Math.min(255, d[i+2] + wOffset);
                if(sOffset > 0 && i % 8 === 0) { d[i] = d[i]*(1-sOffset) + 200*sOffset; }
            }
            ctxEdit.putImageData(imgData, 0, 0);

            if (faceLandmarksData) {
                const cx = faceLandmarksData[4].x * canvasEdit.width;
                const cy = faceLandmarksData[4].y * canvasEdit.height;
                if (currentMakeup !== 'none') {
                    ctxEdit.save();
                    ctxEdit.fillStyle = "rgba(255, 182, 193, 0.4)";
                    if(currentMakeup==='korean') { ctxEdit.beginPath(); ctxEdit.arc(cx-40, cy+20, 25, 0, Math.PI*2); ctxEdit.arc(cx+40, cy+20, 25, 0, Math.PI*2); ctxEdit.fill(); }
                    ctxEdit.restore();
                }
                if (currentSticker !== 'none') {
                    ctxEdit.save();
                    if (currentSticker === 'glasses') { ctxEdit.strokeStyle = "#000"; ctxEdit.lineWidth = 3; ctxEdit.beginPath(); ctxEdit.arc(cx-30, cy-10, 20, 0, Math.PI*2); ctxEdit.arc(cx+30, cy-10, 20, 0, Math.PI*2); ctxEdit.stroke(); }
                    ctxEdit.restore();
                }
            }
        }

        function saveToPhoto() {
            const link = document.createElement('a');
            link.download = 'perfect-beauty-photo.png';
            link.href = canvasEdit.toDataURL();
            link.click();
            setTimeout(() => { location.reload(); }, 1000);
        }
    </script>
</body>
</html>
