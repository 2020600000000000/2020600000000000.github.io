<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>拍照後美白修圖</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  text-align: center;
}

video, canvas {
  width: 100%;
  max-height: 80vh;
  object-fit: contain;
  background: black;
}

#controls {
  position: fixed;
  bottom: 10px;
  width: 100%;
  color: white;
}

button, input {
  margin: 5px;
  padding: 10px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="controls">
  <button id="snap">📸 拍照</button>
  <button id="download">⬇️ 下載修圖</button>
  <br>
  ✨ 美白強度
  <input id="slider" type="range" min="0.8" max="1.5" step="0.01" value="1.1">
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");

let captured = false;

// 📷 相機
const camera = new Camera(video, {
  onFrame: async () => {},
  width: 640,
  height: 480
});
camera.start();

// 📸 拍照
document.getElementById("snap").onclick = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  captured = true;
  alert("已拍照，可以調整美白！");
};

// 🎯 皮膚判斷
function isSkin(r, g, b) {
  return (
    r > 95 && g > 40 && b > 20 &&
    Math.max(r, g, b) - Math.min(r, g, b) > 15 &&
    r > g && r > b
  );
}

// ✨ 美白處理
function applyBeauty() {
  if (!captured) return;

  const strength = parseFloat(slider.value);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (isSkin(r, g, b)) {
      data[i]     = Math.min(255, r * strength);
      data[i + 1] = Math.min(255, g * strength);
      data[i + 2] = Math.min(255, b * strength);
    }
  }

  ctx.putImageData(imageData, 0, 0);
}

// 🎚 拉桿即時更新
slider.addEventListener("input", applyBeauty);

// ⬇️ 下載
document.getElementById("download").onclick = () => {
  const link = document.createElement("a");
  link.download = "beauty_photo.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};
</script>

</body>
</html>
