<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 古典美學重塑相機 - GitHub Pages 部署版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* 歡迎頁面 */
        .intro-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; padding: 30px; text-align: center; }
        .intro-title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #ff9500, #ff2d55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
        .intro-desc { font-size: 14px; color: #aaa; line-height: 1.6; max-width: 300px; margin-bottom: 40px; }
        .btn-start { background: linear-gradient(135deg, #0071e3, #34c759); border: none; padding: 16px 45px; border-radius: 30px; color: white; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px rgba(0,113,227,0.3); transition: transform 0.2s; }
        .btn-start:active { transform: scale(0.96); }

        /* 主舞台 (拍攝區) */
        .stage-container { display: none; flex-direction: column; align-items: center; width: 100vw; max-width: 450px; height: 100vh; position: relative; justify-content: space-between; padding: 20px 0; }
        .top-status-bar { width: 90%; background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 15px; text-align: center; font-size: 12px; font-weight: 500; color: #e5e5ea; border: 1px solid rgba(255,255,255,0.05); }
        
        /* 相機畫布容器 (360x630, 9:15高挑黃金比例) */
        .viewport-wrapper { width: 360px; height: 630px; background-color: #000; border-radius: 24px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #hidden-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #canvas-raw { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #canvas-live-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* 濾鏡滑動軸 */
        .bottom-interaction-panel { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .filter-hint { font-size: 13px; color: #ff9500; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .filter-scroll-container { width: 100%; display: flex; overflow-x: auto; gap: 15px; padding: 5px 25px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .filter-scroll-container::-webkit-scrollbar { display: none; }
        .filter-thumb-item { display: flex; flex-direction: column; align-items: center; gap: 6px; scroll-snap-align: center; cursor: pointer; opacity: 0.5; transition: opacity 0.2s, transform 0.2s; }
        .filter-thumb-item.active { opacity: 1; transform: scale(1.05); }
        .filter-circle-preview { width: 66px; height: 66px; border-radius: 50%; border: 2px solid transparent; overflow: hidden; transition: border-color 0.2s; background: #2c2c2e; }
        .filter-thumb-item.active .filter-circle-preview { border-color: #0071e3; }
        .filter-circle-preview canvas { width: 100%; height: 100%; object-fit: cover; }
        .filter-thumb-name { font-size: 11px; font-weight: 500; color: #aeaeb2; }
        .filter-thumb-item.active .filter-thumb-name { color: #0071e3; font-weight: 600; }

        /* 編輯後期加工舞台 */
        .edit-viewport-box { width: 360px; height: 450px; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.6); background: #000; }
        #canvas-edit-preview { width: 100%; height: 100%; display: block; }
        
        /* 工具底板 */
        .edit-control-dashboard { width: 100%; background: #1c1c1e; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px 0; display: flex; flex-direction: column; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.3); }
        .edit-tabs-row { display: flex; width: 90%; justify-content: space-around; margin-bottom: 20px; background: #2c2c2e; padding: 4px; border-radius: 12px; }
        .btn-item { flex: 1; background: transparent; border: none; padding: 10px 0; border-radius: 10px; color: #aeaeb2; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .btn-item.active { background: #3a3a3c; color: #fff; }
        
        /* 細部調節面板 */
        .sub-panel { width: 90%; display: none; flex-direction: column; gap: 15px; min-height: 80px; justify-content: center; }
        .slider-group { display: flex; align-items: center; justify-content: space-between; width: 100%; font-size: 13px; color: #e5e5ea; }
        .slider-group label { width: 70px; }
        .slider-group input[type="range"] { flex: 1; margin: 0 12px; accent-color: #0071e3; }
        .slider-group span { width: 35px; text-align: right; color: #aeaeb2; }
        
        /* 妝容、貼紙按鈕群組 */
        .buttons-scroll-row { width: 100%; display: flex; overflow-x: auto; gap: 12px; padding: 4px 0; scrollbar-width: none; }
        .buttons-scroll-row::-webkit-scrollbar { display: none; }
        .makeup-thumb-btn, .sticker-thumb-btn { padding: 8px 16px; background: #2c2c2e; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; color: #e5e5ea; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .makeup-thumb-btn.active, .sticker-thumb-btn.active { background: rgba(0,113,227,0.15); border-color: #0071e3; color: #0071e3; font-weight: 600; }
        
        /* 大功能動作按紐 */
        .action-buttons-wrapper { width: 90%; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-ratio-toggle { width: 100%; background: #2c2c2e; border: 1px solid rgba(255,149,0,0.3); color: #ff9500; font-size: 13px; font-weight: 600; padding: 12px 0; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-ratio-toggle.active { background: #ff9500; color: #000; }
        .btn-download-trigger { width: 100%; background: linear-gradient(135deg, #34c759, #248a3d); border: none; color: white; font-size: 15px; font-weight: 700; padding: 14px 0; border-radius: 14px; cursor: pointer; box-shadow: 0 6px 15px rgba(52,199,89,0.3); }
    </style>
</head>
<body>

    <div class="intro-stage" id="stage-intro">
        <div class="intro-title">AI 古典美學重塑相機</div>
        <div class="intro-desc">融合黃金比例面具、多維智能五官彩妝與無感磨皮，支援 AI 揮手切換濾鏡及精準 OK 倒數捕捉。</div>
        <button class="btn-start" onclick="enterCameraStage()">開啟 AI 相機體驗</button>
    </div>

    <div class="stage-container" id="stage-capture">
        <div class="top-status-bar" id="status-text">👋 任意處揮手換濾鏡 | 👌 比出 OK 觸發倒數拍照</div>
        
        <div class="viewport-wrapper">
            <video id="hidden-video" autoplay playsinline muted></video>
            <canvas id="canvas-raw"></canvas>
            <canvas id="canvas-live-fx"></canvas>
        </div>

        <div class="bottom-interaction-panel">
            <div class="filter-hint" id="filter-name">目前濾鏡：原圖</div>
            <div class="filter-scroll-container" id="filter-bar"></div>
        </div>
    </div>

    <div class="stage-container" id="stage-edit" style="padding-bottom: 0;">
        <div class="top-status-bar" style="color:#34c759; background:rgba(52,199,89,0.1); border-color:rgba(52,199,89,0.2);">📸 捕捉成功！已進入黃金美學微調艙</div>
        
        <div class="edit-viewport-box" id="preview-container">
            <canvas id="canvas-edit-preview"></canvas>
        </div>

        <div class="edit-control-dashboard">
            <div class="edit-tabs-row">
                <button class="btn-item active" id="btn-skin" onclick="openSubPanel('skin')">膚質塑造</button>
                <button class="btn-item" id="btn-makeup" onclick="openSubPanel('makeup')">古風五官</button>
                <button class="btn-item" id="btn-sticker" onclick="openSubPanel('sticker')">實體貼紙</button>
            </div>

            <div class="sub-panel" id="panel-skin" style="display: flex;">
                <div class="slider-group">
                    <label>精細磨皮</label>
                    <input type="range" id="slider-smooth-val" min="0" max="100" value="40" oninput="document.getElementById('lbl-smooth').innerText=this.value; applyEditEffects();">
                    <span id="lbl-smooth">40</span>
                </div>
                <div class="slider-group">
                    <label>智能美白</label>
                    <input type="range" id="slider-whiten" min="0" max="100" value="30" oninput="document.getElementById('lbl-whiten').innerText=this.value; applyEditEffects();">
                    <span id="lbl-whiten">30</span>
                </div>
            </div>

            <div class="sub-panel" id="panel-makeup">
                <div class="buttons-scroll-row">
                    <button class="makeup-thumb-btn active" id="mk-none" onclick="setMakeup('none')">素顏純淨</button>
                    <button class="makeup-thumb-btn" id="mk-kr" onclick="setMakeup('kr')">微醺果凍</button>
                    <button class="makeup-thumb-btn" id="mk-jp" onclick="setMakeup('jp')">日系潮紅</button>
                    <button class="makeup-thumb-btn" id="mk-opera" onclick="setMakeup('opera')">國風戲曲</button>
                    <button class="makeup-thumb-btn" id="mk-eu" onclick="setMakeup('eu')">立體深邃</button>
                </div>
            </div>

            <div class="sub-panel" id="panel-sticker">
                <div class="buttons-scroll-row">
                    <button class="sticker-thumb-btn active" id="stk-none" onclick="setSticker('none')">移除貼紙</button>
                    <button class="sticker-thumb-btn" id="stk-5188" onclick="setSticker('5188')">花鈿貼 5188</button>
                    <button class="sticker-thumb-btn" id="stk-5189" onclick="setSticker('5189')">古風貼 5189</button>
                    <button class="sticker-thumb-btn" id="stk-5190" onclick="setSticker('5190')">面飾貼 5190</button>
                    <button class="sticker-thumb-btn" id="stk-5192" onclick="setSticker('5192')">點綴貼 5192</button>
                    <button class="sticker-thumb-btn" id="stk-5195" onclick="setSticker('5195')">古典貼 5195</button>
                </div>
            </div>

            <div class="action-buttons-wrapper">
                <button class="btn-ratio-toggle" id="btn-toggle-ratio" onclick="toggleGoldenRatioMask()">📐 開啟一鍵黃金比例遮罩</button>
                <button class="btn-download-trigger" onclick="savePhoto()">💾 融合保存至手機相簿</button>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasRaw = document.getElementById('canvas-raw');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');

        const ctxRaw = canvasRaw.getContext('2d');
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let currentFilterIndex = 0;
        const filters = ['原圖', '浪漫粉紅', '日系清新', '冷調冷冽', '暖陽復古'];
        const filterCSSMap = { 
            '原圖': 'none', 
            '浪漫粉紅': 'hue-rotate(-10deg) saturate(1.2) brightness(1.05)', 
            '日系清新': 'brightness(1.15) contrast(0.9)', 
            '冷調冷冽': 'saturate(0.6) contrast(1.15) hue-rotate(15deg)', 
            '暖陽復古': 'sepia(0.25) saturate(1.3)' 
        };
        
        let faceLandmarksData = null; 
        let showGoldenRatio = false;  
        let isCountingDown = false; 
        let countdownTimer = null;
        let capturedVideoFrame = document.createElement('canvas'); 
        let currentMakeup = 'none'; 
        let currentSticker = 'none';

        // 載入貼紙圖片 (預設改為小寫 .jpg，如檔名是大寫請改回 .JPG)
        const stickerImages = {};
        const stickerIds = ['5188', '5189', '5190', '5191', '5192', '5193', '5194', '5195', '5196', '5197'];
        stickerIds.forEach(id => {
            const img = new Image();
            img.src = `IMG_${id}.jpg`; 
            stickerImages[id] = img;
        });

        let stickerState = { x: 180, y: 225, scale: 1.0, angle: 0, width: 120, height: 120 };
        let isDragging = false; 
        let dragStartX = 0, dragStartY = 0;
        let initStickerX = 0, initStickerY = 0;
        let startTouchDist = 0, startTouchAngle = 0, initScale = 1.0, initAngle = 0;
        
        const CW = 360;
        const CH = 630;
        let isCameraActive = false;
        
        let lastHandX = null;
        let waveCooldown = false;
        let okStartTime = null;

        let hands = null;
        let faceMesh = null;

        function init() {
            canvasRaw.width = CW;
            canvasRaw.height = CH;
            canvasLiveFx.width = CW; 
            canvasLiveFx.height = CH;
            canvasEdit.width = 360; 
            canvasEdit.height = 450;
            capturedVideoFrame.width = 360;
            capturedVideoFrame.height = 450;
            buildFilterScrollThumbs();
        }

        function buildFilterScrollThumbs() {
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = '';
            filters.forEach((name, idx) => {
                const item = document.createElement('div');
                item.className = `filter-thumb-item ${idx === 0 ? 'active' : ''}`;
                item.id = `thumb-item-${idx}`;
                item.onclick = () => selectFilterByIndex(idx);

                const circle = document.createElement('div');
                circle.className = 'filter-circle-preview';
                circle.style.filter = filterCSSMap[name];

                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.id = `thumb-canvas-${idx}`;
                thumbCanvas.width = 80;
                thumbCanvas.height = 80;

                circle.appendChild(thumbCanvas);
                
                const label = document.createElement('div');
                label.className = 'filter-thumb-name';
                label.innerText = name;

                item.appendChild(circle);
                item.appendChild(label);
                bar.appendChild(item);
            });
        }

        function selectFilterByIndex(idx) {
            currentFilterIndex = idx;
            document.getElementById('filter-name').innerText = `目前濾鏡：${filters[idx]}`;
            document.querySelectorAll('.filter-thumb-item').forEach((item, i) => {
                item.classList.toggle('active', i === idx);
            });
            const el = document.getElementById(`thumb-item-${idx}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function enterCameraStage() {
            document.getElementById('stage-intro').style.display = 'none';
            document.getElementById('stage-capture').style.display = 'flex';

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
            })
            .then(stream => {
                videoElement.srcObject = stream;
                isCameraActive = true;
                startRenderLoop();
                initMediaPipeAI(); 
            })
            .catch(err => {
                alert("相機開啟失敗，請確認是否給予瀏覽器相機使用權限。");
                console.error(err);
            });
        }

        function drawVideoCover(ctx, video, canvasW, canvasH) {
            if (video.videoWidth === 0) return;
            const vW = video.videoWidth; 
            const vH = video.videoHeight;
            const videoRatio = vW / vH; 
            const canvasRatio = canvasW / canvasH;
            let sx, sy, sW, sH;
            if (videoRatio > canvasRatio) {
                sH = vH;
                sW = vH * canvasRatio; 
                sx = (vW - sW) / 2; 
                sy = 0;
            } else {
                sW = vW;
                sH = vW / canvasRatio; 
                sx = 0; 
                sy = (vH - sH) / 2;
            }
            ctx.save();
            ctx.translate(canvasW, 0); 
            ctx.scale(-1, 1); 
            ctx.drawImage(video, sx, sy, sW, sH, 0, 0, canvasW, canvasH);
            ctx.restore();
        }

        function startRenderLoop() {
            if (!isCameraActive) return;
            if (videoElement.readyState >= 2) {
                drawVideoCover(ctxRaw, videoElement, CW, CH);
                canvasLiveFx.style.filter = filterCSSMap[filters[currentFilterIndex]];
                drawVideoCover(ctxLive, videoElement, CW, CH);

                filters.forEach((name, idx) => {
                    const tCan = document.getElementById(`thumb-canvas-${idx}`);
                    if (tCan) drawVideoCover(tCan.getContext('2d'), videoElement, 80, 80);
                });
            }
            requestAnimationFrame(startRenderLoop);
        }

        function initMediaPipeAI() {
            alert("initMediaPipeAI 啟動成功！");

            hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.6 });
            
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    document.getElementById('status-text').innerText = '👋 偵測到手掌，分析手勢中...';
                    handleAIGestures(results.multiHandLandmarks[0]);
                } else {
                    lastHandX = null;
                    okStartTime = null;
                    if (!isCountingDown) {
                        document.getElementById('status-text').innerText = '👋 任意處揮手換濾鏡 | 👌 比出 OK 觸發倒數拍照';
                    }
                }
            });

            faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
            
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    faceLandmarksData = results.multiFaceLandmarks[0];
                }
            });

            requestAnimationFrame(aiLoop);
        }

        async function aiLoop() {
            if (!isCameraActive) return;
            if (videoElement.readyState >= 2 && hands && faceMesh) {
                try {
                    await Promise.all([
                        hands.send({ image: videoElement }),
                        faceMesh.send({ image: videoElement })
                    ]);
                } catch (e) {
                    console.error("AI 畫面資料傳送錯誤:", e);
                }
            }
            requestAnimationFrame(aiLoop);
        }

        function handleAIGestures(lm) {
            const status = document.getElementById('status-text');

            // OK 手勢
            const okDistance = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
            const isOk = okDistance < 0.055; 

            if (isOk && !isCountingDown) {
                if (!okStartTime) {
                    okStartTime = Date.now();
                }
                const holdTime = Date.now() - okStartTime;
                status.innerText = `👌 OK 偵測中... 蓄力值: ${Math.min(5, Math.floor(holdTime / 100))}/5`;
                
                if (holdTime > 500) { 
                    okStartTime = null;
                    triggerCountdownCamera();
                }
            } else {
                okStartTime = null;
            }

            // 揮手手勢
            const currentX = lm[9].x; 
            if (lastHandX !== null && !waveCooldown && !isCountingDown) {
                const delta = currentX - lastHandX;
                if (Math.abs(delta) > 0.035) { 
                    waveCooldown = true;
                    if (delta > 0) {
                        currentFilterIndex = (currentFilterIndex + 1) % filters.length;
                    } else {
                        currentFilterIndex = (currentFilterIndex - 1 + filters.length) % filters.length;
                    }
                    selectFilterByIndex(currentFilterIndex);
                    status.innerText = `👋 揮手觸發！已變更濾鏡為：${filters[currentFilterIndex]}`;
                    setTimeout(() => { waveCooldown = false; }, 650); 
                }
            }
            lastHandX = currentX;
        }

        function triggerCountdownCamera() {
            if (isCountingDown) return;
            isCountingDown = true;
            let count = 5;
            const status = document.getElementById('status-text');
            status.style.color = "#ffcc00";
            status.innerText = `👌 偵測到 OK 手勢！倒數 ${count} 秒後自動拍照...`;
            
            countdownTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    status.innerText = `👌 偵測到 OK 手勢！倒數 ${count} 秒後自動拍照...`;
                } else {
                    clearInterval(countdownTimer);
                    status.innerText = "📸 快門捕捉中...";
                    setTimeout(triggerSnapshot, 200);
                }
            }, 1000);
        }

        function triggerSnapshot() {
            isCameraActive = false;
            const bCtx = capturedVideoFrame.getContext('2d');
            bCtx.drawImage(canvasLiveFx, 0, 0, 360, 450); 
            
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop()); 
            }

            document.getElementById('stage-capture').style.display = 'none';
            document.getElementById('stage-edit').style.display = 'flex';
            
            if (faceLandmarksData) {
                stickerState.x = faceLandmarksData[1].x * 360;
                stickerState.y = faceLandmarksData[1].y * 450;
            }
            
            openSubPanel('skin');
            initStickerInteractions();
        }

        function toggleGoldenRatioMask() {
            showGoldenRatio = !showGoldenRatio;
            const btn = document.getElementById('btn-toggle-ratio');
            if (showGoldenRatio) {
                btn.innerText = "📐 關閉黃金比例遮罩";
                btn.classList.add('active');
            } else {
                btn.innerText = "📐 開啟一鍵黃金比例遮罩";
                btn.classList.remove('active');
            }
            applyEditEffects();
        }

        function openSubPanel(id) {
            document.querySelectorAll('.sub-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).style.display = 'flex';
            document.getElementById('btn-' + id).classList.add('active');
            applyEditEffects();
        }

        function setMakeup(m) { 
            currentMakeup = m; 
            document.querySelectorAll('.mk-btn').forEach(b => b.classList.toggle('active', b.id === 'mk-'+m));
            applyEditEffects(); 
        }

        function setSticker(s) { 
            currentSticker = s;
            document.querySelectorAll('.stk-btn').forEach(b => b.classList.toggle('active', b.id === 'stk-'+s)); 
            applyEditEffects(); 
        }

        function applyEditEffects() {
            const w = canvasEdit.width;
            const h = canvasEdit.height;
            ctxEdit.clearRect(0, 0, w, h);
            
            ctxEdit.drawImage(capturedVideoFrame, 0, 0);
            if (!faceLandmarksData) return;

            const skinMask = document.createElement('canvas');
            skinMask.width = w; 
            skinMask.height = h; 
            const smCtx = skinMask.getContext('2d');
            
            smCtx.fillStyle = 'white'; 
            smCtx.beginPath();
            [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                if (i === 0) smCtx.moveTo(faceLandmarksData[idx].x * w, faceLandmarksData[idx].y * h); 
                else smCtx.lineTo(faceLandmarksData[idx].x * w, faceLandmarksData[idx].y * h);
            });
            smCtx.closePath(); 
            smCtx.fill();

            smCtx.globalCompositeOperation = 'destination-out';
            const digZone = (arr) => { 
                smCtx.beginPath();
                arr.forEach(idx => smCtx.lineTo(faceLandmarksData[idx].x * w, faceLandmarksData[idx].y * h)); 
                smCtx.fill(); 
            };
            digZone([33, 160, 158, 133, 153, 144]);
            digZone([362, 385, 387, 263, 373, 380]);
            digZone([61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291]);

            const whitVal = parseInt(document.getElementById('slider-whiten').value);
            if (whitVal > 0) {
                const whitenLayer = document.createElement('canvas');
                whitenLayer.width = w; 
                whitenLayer.height = h;
                const wlCtx = whitenLayer.getContext('2d');
                wlCtx.drawImage(capturedVideoFrame, 0, 0);
                const imgData = wlCtx.getImageData(0, 0, w, h);
                const px = imgData.data;
                const offset = (whitVal / 100) * 32;
                for(let i=0; i<px.length; i+=4) {
                    if(px[i] > 45 && px[i] > px[i+2]) {
                        px[i] = Math.min(255, px[i] + offset);
                        px[i+1] = Math.min(255, px[i+1] + offset * 0.95);
                        px[i+2] = Math.min(255, px[i+2] + offset * 0.88);
                    }
                }
                wlCtx.putImageData(imgData, 0, 0);
                const whitenMasked = document.createElement('canvas');
                whitenMasked.width = w; 
                whitenMasked.height = h;
                const wmCtx = whitenMasked.getContext('2d');
                wmCtx.drawImage(skinMask, 0, 0);
                wmCtx.globalCompositeOperation = 'source-in';
                wmCtx.drawImage(whitenLayer, 0, 0);
                ctxEdit.drawImage(whitenMasked, 0, 0);
            }

            const smooVal = parseInt(document.getElementById('slider-smooth-val').value);
            if (smooVal > 0) {
                const blurLayer = document.createElement('canvas');
                blurLayer.width = w; 
                blurLayer.height = h;
                const blCtx = blurLayer.getContext('2d');
                blCtx.filter = `blur(${smooVal * 0.12}px)`; 
                blCtx.drawImage(canvasEdit, 0, 0);
                const smoothMasked = document.createElement('canvas'); 
                smoothMasked.width = w; 
                smoothMasked.height = h;
                const smMctx = smoothMasked.getContext('2d');
                smMctx.drawImage(skinMask, 0, 0);
                smMctx.globalCompositeOperation = 'source-in';
                smMctx.drawImage(blurLayer, 0, 0);

                ctxEdit.save();
                ctxEdit.globalAlpha = smooVal / 100;
                ctxEdit.drawImage(smoothMasked, 0, 0);
                ctxEdit.restore();
            }

            drawOurThemedMakeup(ctxEdit, faceLandmarksData, w, h);
            
            if (showGoldenRatio) {
                drawOurClassicGoldenRatio(ctxEdit, faceLandmarksData, w, h);
            }
            
            if (currentSticker !== 'none' && stickerImages[currentSticker]) {
                const img = stickerImages[currentSticker];
                ctxEdit.save();
                ctxEdit.translate(stickerState.x, stickerState.y);
                ctxEdit.rotate(stickerState.angle);
                const currentW = stickerState.width * stickerState.scale;
                const currentH = stickerState.height * stickerState.scale;
                ctxEdit.drawImage(img, -currentW / 2, -currentH / 2, currentW, currentH);
                ctxEdit.restore();
            }
        }

        function drawOurClassicGoldenRatio(ctx, lm, w, h) {
            ctx.save();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "rgba(255, 149, 0, 0.85)";
            ctx.setLineDash([5, 5]);

            const hairlineY = lm[10].y * h;  
            const browCenterY = lm[9].y * h;
            const noseTipY = lm[1].y * h;    
            const chinBottomY = lm[152].y * h;
            [hairlineY, browCenterY, noseTipY, chinBottomY].forEach(yPos => {
                ctx.beginPath(); ctx.moveTo(0, yPos); ctx.lineTo(w, yPos); ctx.stroke();
            });

            ctx.strokeStyle = "rgba(0, 113, 227, 0.7)";
            const leftFaceEdgeX = lm[234].x * w;  
            const leftEyeOuterCornerX = lm[130].x * w; 
            const leftEyeInnerCornerX = lm[133].x * w;
            const rightEyeInnerCornerX = lm[362].x * w;
            const rightEyeOuterCornerX = lm[263].x * w;
            const rightFaceEdgeX = lm[454].x * w;
            [leftFaceEdgeX, leftEyeOuterCornerX, leftEyeInnerCornerX, rightEyeInnerCornerX, rightEyeOuterCornerX, rightFaceEdgeX].forEach(xPos => {
                ctx.beginPath(); ctx.moveTo(xPos, 0); ctx.lineTo(xPos, h); ctx.stroke();
            });

            ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
            ctx.strokeStyle = "rgba(255, 255, 255, 0.45)";
            ctx.setLineDash([]);
            ctx.lineWidth = 1;
            
            ctx.beginPath();
            [70, 63, 105, 66, 107].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h));
            ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.beginPath();
            [300, 293, 334, 296, 336].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h));
            ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.fillStyle = "rgba(255, 59, 48, 0.15)";
            ctx.strokeStyle = "rgba(255, 59, 48, 0.5)";
            ctx.beginPath();
            [61, 185, 40, 37, 0, 267, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146].forEach(i => {
                ctx.lineTo(lm[i].x * w, lm[i].y * h);
            });
            ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.restore();
        }

        function drawOurThemedMakeup(ctx, lm, w, h) {
            if (currentMakeup === 'none') return;
            ctx.save();
            
            if (currentMakeup === 'kr') {
                ctx.fillStyle = "rgba(255, 65, 105, 0.5)";
                ctx.filter = "blur(2px)";
                ctx.beginPath(); 
                [61,146,91,181,84,17,314,405,321,375,291].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h)); 
                ctx.fill();
                ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                ctx.filter = "blur(8px)";
                ctx.beginPath(); ctx.arc(lm[50].x * w, lm[50].y * h, 18, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath();
                ctx.arc(lm[280].x * w, lm[280].y * h, 18, 0, Math.PI * 2); ctx.fill();
            } else if (currentMakeup === 'jp') {
                ctx.fillStyle = "rgba(255, 110, 120, 0.35)";
                ctx.filter = "blur(12px)";
                ctx.beginPath();
                ctx.arc(lm[31].x * w, lm[31].y * h + 12, 22, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath();
                ctx.arc(lm[261].x * w, lm[261].y * h + 12, 22, 0, Math.PI * 2); ctx.fill();
            } else if (currentMakeup === 'opera') {
                ctx.fillStyle = "rgba(235, 0, 40, 0.75)";
                ctx.filter = "blur(4px)";
                ctx.beginPath();
                [70, 156, 157, 33, 113].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h)); ctx.fill();
                ctx.beginPath();
                [300, 383, 384, 263, 342].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h)); ctx.fill();
                ctx.fillStyle = "rgba(255, 0, 10, 0.9)";
                ctx.filter = "none";
                ctx.beginPath(); 
                [61,146,91,181,84,17,314,405,321,375,291].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h)); 
                ctx.fill();
            } else if (currentMakeup === 'eu') {
                ctx.fillStyle = "rgba(85, 55, 45, 0.35)";
                ctx.filter = "blur(10px)";
                ctx.beginPath();
                [111, 117, 118, 101].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h)); ctx.fill();
                ctx.beginPath();
                [340, 346, 347, 330].forEach(i => ctx.lineTo(lm[i].x * w, lm[i].y * h)); ctx.fill();
            }
            ctx.restore();
        }

        function initStickerInteractions() {
            const container = document.getElementById('preview-container');
            const getEventCoords = (e) => {
                let rect = canvasEdit.getBoundingClientRect();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (canvasEdit.width / rect.width),
                    y: (clientY - rect.top) * (canvasEdit.height / rect.height)
                };
            };

            const handleStart = (x, y, isMultiTouch = false, distance = 0, angle = 0) => {
                if (currentSticker === 'none') return;
                const currentW = stickerState.width * stickerState.scale;
                
                if (!isMultiTouch) {
                    if (Math.hypot(x - stickerState.x, y - stickerState.y) < currentW * 0.7) {
                        isDragging = true;
                        dragStartX = x; dragStartY = y;
                        initStickerX = stickerState.x; initStickerY = stickerState.y;
                    }
                } else {
                    isDragging = false;
                    startTouchDist = distance;
                    startTouchAngle = angle;
                    initScale = stickerState.scale;
                    initAngle = stickerState.angle;
                }
            };

            canvasEdit.addEventListener('mousedown', (e) => {
                let p = getEventCoords(e);
                handleStart(p.x, p.y);
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let p = getEventCoords(e);
                stickerState.x = initStickerX + (p.x - dragStartX);
                stickerState.y = initStickerY + (p.y - dragStartY);
                applyEditEffects();
            });
            
            window.addEventListener('mouseup', () => { isDragging = false; });

            canvasEdit.addEventListener('wheel', (e) => {
                if (currentSticker === 'none') return; 
                e.preventDefault();
                stickerState.scale = Math.max(0.3, Math.min(4.0, stickerState.scale + (e.deltaY > 0 ? -0.05 : 0.05)));
                applyEditEffects();
            }, { passive: false });

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    let p = getEventCoords(e);
                    handleStart(p.x, p.y);
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.hypot(dx, dy);
                    const ang = Math.atan2(dy, dx);
                    handleStart(0, 0, true, dist, ang);
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (currentSticker === 'none') return;
                
                if (isDragging && e.touches.length === 1) {
                    e.preventDefault();
                    let p = getEventCoords(e);
                    stickerState.x = initStickerX + (p.x - dragStartX);
                    stickerState.y = initStickerY + (p.y - dragStartY);
                    applyEditEffects();
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.hypot(dx, dy);
                    const ang = Math.atan2(dy, dx);

                    stickerState.scale = Math.max(0.3, Math.min(4.0, initScale * (dist / startTouchDist)));
                    stickerState.angle = initAngle + (ang - startTouchAngle);
                    applyEditEffects();
                }
            }, { passive: false });
            
            window.addEventListener('touchend', () => { isDragging = false; });
        }

        function savePhoto() { 
            alert("🎉 照片已融合智慧磨皮、精準美白、主題五官妝容、實體旋轉貼紙與專屬黃金比例線，儲存相簿成功！");
        }

        window.onload = init;
    </script>
