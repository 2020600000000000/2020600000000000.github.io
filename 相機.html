<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>膚色校正（可見效果版）</title>

<style>
body { margin:0; background:black; }
video, canvas {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}
#ui {
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  color:white;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  🎨 強度
  <input id="slider" type="range" min="0" max="1" step="0.01" value="0.6">
  <button id="snap">拍照</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const slider = document.getElementById("slider");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🎯 目標粉嫩膚色
const target = [255, 237, 238];

// 🧍 人像分割（關鍵！）
const segmentation = new SelfieSegmentation({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
});

segmentation.setOptions({ modelSelection: 1 });

function isSkin(r,g,b){
  // 更寬鬆皮膚判斷（確保會作用）
  return r > 60 && g > 30 && b > 20;
}

segmentation.onResults((res)=>{

  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const d = img.data;

  const maskCanvas = document.createElement("canvas");
  maskCanvas.width = canvas.width;
  maskCanvas.height = canvas.height;
  const mctx = maskCanvas.getContext("2d");
  mctx.drawImage(res.segmentationMask,0,0,canvas.width,canvas.height);

  const mask = mctx.getImageData(0,0,canvas.width,canvas.height).data;

  const strength = parseFloat(slider.value);

  for(let i=0;i<d.length;i+=4){

    // 👤 只在人身上
    if(mask[i] < 50) continue;

    let r=d[i], g=d[i+1], b=d[i+2];

    // 🎯 只抓「偏膚色」
    if(isSkin(r,g,b)){

      // 👉 關鍵：往目標色「拉近」(不是乘法)
      d[i]   = r + (target[0]-r)*strength;
      d[i+1] = g + (target[1]-g)*strength;
      d[i+2] = b + (target[2]-b)*strength;
    }
  }

  ctx.putImageData(img,0,0);
});

const camera = new Camera(video,{
  onFrame: async ()=>{
    await segmentation.send({image:video});
  },
  width:640,
  height:480
});

camera.start();

// 📸 拍照（直接輸出結果）
document.getElementById("snap").onclick = ()=>{
  const a=document.createElement("a");
  a.download="skin.png";
  a.href=canvas.toDataURL();
  a.click();
};
</script>

</body>
</html>
