<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧美顏相機網頁系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f5f5f7; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        /* 1. 介紹頁面板樣式 */
        .intro-stage { display: flex; flex-direction: column; align-items: center; max-width: 600px; width: 100%; background: #ffffff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 40px; }
        .intro-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: #1d1d1f; text-align: center; }
        .intro-content { font-size: 16px; color: #515154; line-height: 1.8; margin-bottom: 30px; width: 100%; }
        .intro-content ul { padding-left: 20px; margin-top: 10px; }
        .start-btn { background-color: #0071e3; color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(0,113,227,0.3); }
        .start-btn:hover { background-color: #0077ed; transform: scale(1.03); }

        /* 2. 拍照與後製階段樣式 */
        .header-title { font-size: 32px; font-weight: bold; margin-bottom: 30px; text-align: center; color: #000; }
        .camera-stage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        .countdown-overlay { font-size: 48px; font-weight: bold; color: red; margin-bottom: 15px; height: 60px; text-align: center; }
        .viewfinders { display: flex; gap: 20px; width: 100%; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .viewfinder-box { width: 420px; height: 500px; background-color: #8e8e8e; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-size: 28px; font-weight: bold; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .viewfinder-box canvas, .viewfinder-box video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder-label { position: absolute; z-index: 10; pointer-events: none; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .filter-bar { width: 100%; max-width: 860px; background-color: #8e8e8e; padding: 25px; border-radius: 8px; text-align: center; font-size: 26px; font-weight: bold; color: #000; margin-bottom: 20px; cursor: pointer; transition: background 0.2s; }
        .filter-bar:hover { background-color: #7a7a7a; }
        
        .edit-stage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
        .preview-box { width: 500px; height: 500px; background-color: #8e8e8e; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; color: #000; font-size: 32px; position: relative; overflow: hidden; }
        .preview-box canvas { width: 100%; height: 100%; object-fit: cover; }
        .menu-row { display: flex; gap: 15px; justify-content: center; width: 100%; margin-bottom: 20px; }
        .btn-item { width: 100px; height: 65px; background-color: #8e8e8e; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-item.active { background-color: #555555; color: #fff; }
        .sub-panel { width: 100%; max-width: 500px; display: none; flex-direction: column; align-items: flex-start; margin-bottom: 20px; padding: 10px; }
        .sub-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; background-color: #8e8e8e; padding: 6px 20px; border-radius: 8px; }
        .slider-input { width: 100%; margin: 15px 0; height: 4px; background: #000; outline: none; -webkit-appearance: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #000; cursor: pointer; }
        .confirm-btn { align-self: flex-end; width: 50px; height: 50px; background-color: #b5b5b5; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; border: 2px solid #000; margin-top: 10px; }
        #hidden-video { display: none; }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay playsinline muted></video>

    <div id="stage-intro" class="intro-stage">
        <div class="intro-title">歡迎使用智慧美顏相機系統</div>
        <div class="intro-content">
            <p>本系統結合 AI 影像辨識與即時美顏修圖功能，請詳閱以下操作手勢說明：</p>
            <ul>
                <li>👋 <b>揮手手勢</b>：在鏡頭前左右晃動手掌，可即時切換預覽濾鏡。</li>
                <li>✌️ <b>比 YA 手勢</b>：第一次比 YA 會開啟黃金比例九宮格輔助線，再比一次則可關閉。</li>
                <li>👌 <b>比 OK 手勢</b>：觸發 5 秒拍照倒數，倒數完畢後會自動抓拍並進入後製模式。</li>
            </ul>
            <p style="margin-top: 15px; color: #ff3b30; font-weight: bold;">※ 點擊下方按鈕後，請務必允許瀏覽器的「相機存取權限」喔！</p>
        </div>
        <button class="start-btn" onclick="enterCameraStage()">開始拍照</button>
    </div>

    <div id="stage-capture" class="camera-stage">
        <div class="header-title">智慧美顏相機系統</div>
        <div id="countdown" class="countdown-overlay">正在開啟鏡頭並同步載入 AI 模組...</div>
        
        <div class="viewfinders">
            <div class="viewfinder-box">
                <span class="viewfinder-label">原鏡頭</span>
                <canvas id="canvas-raw"></canvas>
            </div>
            <div class="viewfinder-box">
                <span class="viewfinder-label" style="text-align:center; top:40%;">修圖後<br><span style="font-size:16px; font-weight:normal;">(揮手切換濾鏡.比YA黃金比例輔助<br>第2次YA取消)</span></span>
                <canvas id="canvas-live-fx"></canvas>
            </div>
        </div>
        
        <div class="filter-bar" id="filter-toggle-bar" onclick="manualNextFilter()">
            濾鏡切換 (當前濾鏡: <span id="current-filter-name">無</span>)
        </div>
    </div>

    <div id="stage-edit" class="edit-stage">
        <div class="preview-box">
            <canvas id="canvas-edit-preview"></canvas>
        </div>
        
        <div class="menu-row">
            <button class="btn-item" onclick="switchSubPanel('panel-whiten')">美白</button>
            <button class="btn-item" onclick="switchSubPanel('panel-smooth')">磨皮</button>
            <button class="btn-item" onclick="switchSubPanel('panel-makeup')">妝容</button>
            <button class="btn-item" onclick="switchSubPanel('panel-sticker')">貼紙</button>
        </div>

        <div id="panel-whiten" class="sub-panel">
            <div class="sub-title">美白</div>
            <input type="range" id="slider-whiten" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>

        <div id="panel-smooth" class="sub-panel">
            <div class="sub-title">磨皮</div>
            <input type="range" id="slider-smooth" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>

        <div id="panel-makeup" class="sub-panel">
            <div class="sub-title">妝容</div>
            <div class="menu-row" style="justify-content: flex-start;">
                <button class="btn-item" onclick="setMakeup('korean')">韓系</button>
                <button class="btn-item" onclick="setMakeup('japanese')">日系</button>
                <button class="btn-item" onclick="setMakeup('taiwanese')">歌仔戲</button>
                <button class="btn-item" onclick="setMakeup('european')">歐式</button>
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>

        <div id="panel-sticker" class="sub-panel">
            <div class="sub-title">貼紙</div>
            <div class="menu-row" style="justify-content: flex-start; gap: 10px; flex-wrap: wrap;">
                <button class="btn-item" style="width:70px; height:70px;" onclick="setSticker('glasses')">
                    <svg width="50" height="30" viewBox="0 0 100 40"><circle cx="25" cy="20" r="15" stroke="black" stroke-width="3" fill="none"/><circle cx="75" cy="20" r="15" stroke="black" stroke-width="3" fill="none"/><line x1="40" y1="20" x2="60" y2="20" stroke="black" stroke-width="3"/></svg>
                </button>
                <button class="btn-item" style="width:70px; height:70px;" onclick="setSticker('ears')">
                    <svg width="50" height="40" viewBox="0 0 100 60"><polygon points="10,50 30,10 50,50" fill="pink" stroke="black" stroke-width="2"/><polygon points="50,50 70,10 90,50" fill="pink" stroke="black" stroke-width="2"/></svg>
                </button>
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasRaw = document.getElementById('canvas-raw');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');
        
        const ctxRaw = canvasRaw.getContext('2d');
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let currentFilterIndex = 0;
        const filters = ['無', '復古明亮', '浪漫粉紅', '冷調青翠', '高級灰調', '日系清新', '溫暖陽光', '經典黑白', '戲劇張力', '極光幻彩', '暮色暖橘'];
        
        let showGoldenRatio = false; 
        let lastYaTime = 0;          
        let isCountingDown = false;  
        let capturedBlobImage = null;

        let currentMakeup = 'none';
        let currentSticker = 'none';
        let faceLandmarksData = null; 

        function initCanvasSize() {
            [canvasRaw, canvasLiveFx, canvasEdit].forEach(canvas => {
                canvas.width = 420;
                canvas.height = 500;
            });
        }
        initCanvasSize();

        // 點擊介紹頁的按鈕，才會觸發這個函式去要求鏡頭權限與開啟拍照階段
        function enterCameraStage() {
            // 切換 DOM 顯示狀態
            document.getElementById('stage-intro').style.display = 'none';
            document.getElementById('stage-capture').style.display = 'flex';

            // 請求開啟鏡頭
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        // 鏡頭流一準備好，立馬開啟純畫面繪製，保證不黑屏
                        startBaseCameraLoop();
                        // 接著在背景非同步啟用 AI 模組
                        initMediaPipeAI();
                    });
                })
                .catch(err => {
                    document.getElementById('countdown').innerText = "鏡頭開啟失敗";
                    alert("無法開啟視訊鏡頭。請確保沒有其他應用程式（如 LINE）正在佔用相機，並確認已核准此網頁的相機存取權限。錯誤資訊：" + err);
                });
        }

        // 基本渲染循環（負責把鏡頭畫面畫到畫布上）
        function startBaseCameraLoop() {
            const render = () => {
                if (videoElement.readyState >= 2) {
                    ctxRaw.drawImage(videoElement, 0, 0, canvasRaw.width, canvasRaw.height);
                    ctxLive.drawImage(videoElement, 0, 0, canvasLiveFx.width, canvasLiveFx.height);
                    applyLiveFilter(ctxLive);
                    if (showGoldenRatio) drawGoldenRatioLines(ctxLive);
                }
                requestAnimationFrame(render);
            };
            requestAnimationFrame(render);
        }

        let handsAI = null;
        let faceMeshAI = null;
        
        function initMediaPipeAI() {
            handsAI = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
            });
            handsAI.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
            handsAI.onResults(onHandResults);

            faceMeshAI = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`
            });
            faceMeshAI.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
            faceMeshAI.onResults(onFaceResults);

            let isProcessing = false;
            setInterval(async () => {
                if (videoElement.readyState >= 2 && !isProcessing) {
                    isProcessing = true;
                    try {
                        await handsAI.send({ image: videoElement });
                        await faceMeshAI.send({ image: videoElement });
                        document.getElementById('countdown').innerText = isCountingDown ? document.getElementById('countdown').innerText : "✨ AI 手勢辨識功能已就緒";
                    } catch (e) {
                        console.log("AI 執行緒忙碌中...");
                    }
                    isProcessing = false;
                }
            }, 120); // 略微調低辨識頻率，提升老舊電腦的流暢度
        }

        let lastHandX = null;
        let lastWaveTime = 0;

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;
            const landmarks = results.multiHandLandmarks[0];
            const now = Date.now();

            if (detectWaveGesture(landmarks, now)) manualNextFilter();
            if (detectVSign(landmarks) && (now - lastYaTime > 2000)) {
                lastYaTime = now;
                showGoldenRatio = !showGoldenRatio;
            }
            if (detectOKGesture(landmarks) && !isCountingDown) startPhotoCountdown();
        }

        function onFaceResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                faceLandmarksData = results.multiFaceLandmarks[0];
            }
        }

        function detectWaveGesture(landmarks, now) {
            const wristX = landmarks[0].x;
            if (lastHandX === null) { lastHandX = wristX; return false; }
            const diff = wristX - lastHandX;
            lastHandX = wristX;
            if (Math.abs(diff) > 0.08) {
                if (now - lastWaveTime < 1000) {
                    lastWaveTime = now;
                    return true;
                }
                lastWaveTime = now;
            }
            return false;
        }

        function detectVSign(landmarks) {
            return (landmarks[8].y < landmarks[6].y && 
                    landmarks[12].y < landmarks[10].y && 
                    landmarks[16].y > landmarks[14].y && 
                    landmarks[20].y > landmarks[18].y);
        }

        function detectOKGesture(landmarks) {
            const dx = landmarks[4].x - landmarks[8].x;
            const dy = landmarks[4].y - landmarks[8].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            return (dist < 0.04 && landmarks[12].y < landmarks[10].y && landmarks[16].y < landmarks[14].y);
        }

        function startPhotoCountdown() {
            isCountingDown = true;
            let counter = 5;
            const timerEl = document.getElementById('countdown');
            timerEl.innerText = `OK手勢觸發！倒數 ${counter} 秒...`;
            
            const interval = setInterval(() => {
                counter--;
                if (counter > 0) {
                    timerEl.innerText = `倒數 ${counter} 秒...`;
                } else {
                    clearInterval(interval);
                    timerEl.innerText = "💥 拍照！";
                    setTimeout(() => { takeSnapshot(); }, 200);
                }
            }, 1000);
        }

        function takeSnapshot() {
            capturedBlobImage = document.createElement('canvas');
            capturedBlobImage.width = canvasLiveFx.width;
            capturedBlobImage.height = canvasLiveFx.height;
            capturedBlobImage.getContext('2d').drawImage(canvasLiveFx, 0, 0);

            document.getElementById('stage-capture').style.display = 'none';
            document.getElementById('stage-edit').style.display = 'flex';
            applyEditEffects();
        }

        function manualNextFilter() {
            currentFilterIndex = (currentFilterIndex + 1) % filters.length;
            document.getElementById('current-filter-name').innerText = filters[currentFilterIndex];
        }

        function applyLiveFilter(ctx) {
            const imgData = ctx.getImageData(0, 0, canvasLiveFx.width, canvasLiveFx.height);
            const d = imgData.data;
            switch(filters[currentFilterIndex]) {
                case '復古明亮':
                    for (let i = 0; i < d.length; i += 4) { d[i] *= 1.2; d[i+1] *= 1.1; d[i+2] *= 0.9; } break;
                case '浪漫粉紅':
                    for (let i = 0; i < d.length; i += 4) { d[i] += 30; d[i+2] += 15; } break;
                case '冷調青翠':
                    for (let i = 0; i < d.length; i += 4) { d[i+1] += 20; d[i+2] += 25; } break;
                case '高級灰調':
                    for (let i = 0; i < d.length; i += 4) { let val = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11; d[i] = d[i]*0.6 + val*0.4; d[i+1] = d[i+1]*0.6 + val*0.4; d[i+2] = d[i+2]*0.6 + val*0.4; } break;
                case '經典黑白':
                    for (let i = 0; i < d.length; i += 4) { let v = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11; d[i] = v; d[i+1] = v; d[i+2] = v; } break;
                case '溫暖陽光':
                    for (let i = 0; i < d.length; i += 4) { d[i] += 25; d[i+1] += 15; d[i+2] -= 10; } break;
                case '日系清新':
                    for (let i = 0; i < d.length; i += 4) { d[i] = Math.min(255, d[i]*1.1 + 10); d[i+1] = Math.min(255, d[i+1]*1.1 + 15); d[i+2] = Math.min(255, d[i+2]*1.05 + 20); } break;
                case '戲劇張力':
                    for (let i = 0; i < d.length; i += 4) { d[i] = d[i] > 128 ? d[i]*1.2 : d[i]*0.8; d[i+1] = d[i+1] > 128 ? d[i+1]*1.2 : d[i+1]*0.8; } break;
                case '極光幻彩':
                    for (let i = 0; i < d.length; i += 4) { d[i] = d[i+1]; d[i+2] = d[i]*0.8; } break;
                case '暮色暖橘':
                    for (let i = 0; i < d.length; i += 4) { d[i] += 40; d[i+1] += 10; d[i+2] -= 20; } break;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function drawGoldenRatioLines(ctx) {
            ctx.strokeStyle = "rgba(255, 217, 0, 0.8)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, canvasLiveFx.height/3); ctx.lineTo(canvasLiveFx.width, canvasLiveFx.height/3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 2*canvasLiveFx.height/3); ctx.lineTo(canvasLiveFx.width, 2*canvasLiveFx.height/3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(canvasLiveFx.width/3, 0); ctx.lineTo(canvasLiveFx.width/3, canvasLiveFx.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(2*canvasLiveFx.width/3, 0); ctx.lineTo(2*canvasLiveFx.width/3, canvasLiveFx.height); ctx.stroke();
        }

        function switchSubPanel(panelId) {
            document.querySelectorAll('.sub-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
            if(panelId) {
                document.getElementById(panelId).style.display = 'flex';
                event.target.classList.add('active');
            }
        }

        function setMakeup(style) { currentMakeup = style; applyEditEffects(); }
        function setSticker(type) { currentSticker = type; applyEditEffects(); }

        function applyEditEffects() {
            if (!capturedBlobImage) return;
            ctxEdit.drawImage(capturedBlobImage, 0, 0);

            const whitenVal = document.getElementById('slider-whiten').value;
            const smoothVal = document.getElementById('slider-smooth').value;

            const imgData = ctxEdit.getImageData(0, 0, canvasEdit.width, canvasEdit.height);
            const d = imgData.data;
            
            let wOffset = (whitenVal / 100) * 45;
            let sOffset = (smoothVal / 100);

            for (let i = 0; i < d.length; i += 4) {
                d[i] = Math.min(255, d[i] + wOffset);
                d[i+1] = Math.min(255, d[i+1] + wOffset);
                d[i+2] = Math.min(255, d[i+2] + wOffset);
                if(sOffset > 0 && i % 8 === 0) {
                    d[i] = d[i] * (1 - sOffset) + 200 * sOffset;
                }
            }
            ctxEdit.putImageData(imgData, 0, 0);

            if (faceLandmarksData) {
                const noseBridge = faceLandmarksData[4]; 
                const forehead = faceLandmarksData[10];  
                
                const cx = noseBridge.x * canvasEdit.width;
                const cy = noseBridge.y * canvasEdit.height;
                const fx = forehead.x * canvasEdit.width;
                const fy = forehead.y * canvasEdit.height;

                if (currentMakeup !== 'none') {
                    ctxEdit.save();
                    switch(currentMakeup) {
                        case 'korean': 
                            ctxEdit.fillStyle = "rgba(255, 182, 193, 0.4)";
                            ctxEdit.beginPath(); ctxEdit.arc(cx - 40, cy + 20, 25, 0, Math.PI*2); ctxEdit.fill();
                            ctxEdit.beginPath(); ctxEdit.arc(cx + 40, cy + 20, 25, 0, Math.PI*2); ctxEdit.fill();
                            break;
                        case 'japanese': 
                            ctxEdit.fillStyle = "rgba(255, 140, 0, 0.35)";
                            ctxEdit.beginPath(); ctxEdit.arc(cx - 45, cy + 15, 20, 0, Math.PI*2); ctxEdit.fill();
                            ctxEdit.beginPath(); ctxEdit.arc(cx + 45, cy + 15, 20, 0, Math.PI*2); ctxEdit.fill();
                            break;
                        case 'taiwanese': 
                            ctxEdit.fillStyle = "rgba(255, 0, 128, 0.6)";
                            ctxEdit.beginPath(); ctxEdit.arc(cx - 35, cy, 35, 0, Math.PI*2); ctxEdit.fill();
                            ctxEdit.beginPath(); ctxEdit.arc(cx + 35, cy, 35, 0, Math.PI*2); ctxEdit.fill();
                            ctxEdit.fillStyle = "rgba(139, 0, 0, 0.8)";
                            ctxEdit.beginPath(); ctxEdit.arc(cx, cy + 50, 15, 0, Math.PI*2); ctxEdit.fill();
                            break;
                        case 'european': 
                            ctxEdit.fillStyle = "rgba(139, 90, 43, 0.4)";
                            ctxEdit.fillRect(cx - 60, cy + 30, 30, 40);
                            ctxEdit.fillRect(cx + 30, cy + 30, 30, 40);
                            break;
                    }
                    ctxEdit.restore();
                }

                if (currentSticker !== 'none') {
                    ctxEdit.save();
                    if (currentSticker === 'glasses') { 
                        ctxEdit.strokeStyle = "#000000";
                        ctxEdit.lineWidth = 4;
                        ctxEdit.beginPath(); ctxEdit.arc(cx - 30, cy - 10, 20, 0, Math.PI*2); ctxEdit.stroke();
                        ctxEdit.beginPath(); ctxEdit.arc(cx + 30, cy - 10, 20, 0, Math.PI*2); ctxEdit.stroke();
                        ctxEdit.beginPath(); ctxEdit.moveTo(cx - 10, cy - 10); ctxEdit.lineTo(cx + 10, cy - 10); ctxEdit.stroke();
                    } else if (currentSticker === 'ears') { 
                        ctxEdit.fillStyle = "pink";
                        ctxEdit.strokeStyle = "black";
                        ctxEdit.lineWidth = 3;
                        ctxEdit.beginPath(); ctxEdit.moveTo(fx - 60, fy); ctxEdit.lineTo(fx - 40, fy - 50); ctxEdit.lineTo(fx - 10, fy - 10); ctxEdit.closePath(); ctxEdit.fill(); ctxEdit.stroke();
                        ctxEdit.beginPath(); ctxEdit.moveTo(fx + 10, fy - 10); ctxEdit.lineTo(fx + 40, fy - 50); ctxEdit.lineTo(fx + 60, fy); ctxEdit.closePath(); ctxEdit.fill(); ctxEdit.stroke();
                    }
                    ctxEdit.restore();
                }
            }
        }

        function saveToPhoto() {
            const link = document.createElement('a');
            link.download = 'perfect-beauty-photo.png';
            link.href = canvasEdit.toDataURL();
            link.click();
            setTimeout(() => { location.reload(); }, 1000);
        }
    </script>
</body>
