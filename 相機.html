<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>美顏Camera App</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
}

#cameraView, #editorView {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* camera */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* editor */
canvas {
  width: 100%;
  height: 85%;
  object-fit: contain;
  background: black;
}

#ui {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: white;
}

button {
  padding: 10px;
  margin: 5px;
}

input {
  width: 200px;
}

#editorView {
  display: none;
}
</style>
</head>

<body>

<!-- 📷 CAMERA -->
<div id="cameraView">
  <video id="video" autoplay playsinline></video>
  <button id="snapBtn" style="
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:15px;
    font-size:18px;
  ">📸 拍照</button>
</div>

<!-- 🎨 EDITOR -->
<div id="editorView">
  <canvas id="canvas"></canvas>

  <div id="ui">
    ✨ 美顏強度
    <input id="slider" type="range" min="0" max="1" step="0.01" value="0.5">
    <button id="backBtn">🔙 重拍</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const cameraView = document.getElementById("cameraView");
const editorView = document.getElementById("editorView");

const slider = document.getElementById("slider");

let originalImage = null;

// =======================
// 📷 開相機（GitHub可用）
// =======================
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("相機開啟失敗：" + err);
});

// =======================
// 📸 拍照 → 切畫面
// =======================
document.getElementById("snapBtn").onclick = () => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  originalImage = ctx.getImageData(0, 0, canvas.width, canvas.height);

  cameraView.style.display = "none";
  editorView.style.display = "block";
};

// =======================
// 🌸 膚色調整（安全版，不會糊）
// =======================
const target = [255, 235, 238];

function isSkin(r, g, b) {
  return r > 70 && g > 40 && b > 30;
}

function renderBeauty() {

  if (!originalImage) return;

  let t = parseFloat(slider.value);

  let img = new ImageData(
    new Uint8ClampedArray(originalImage.data),
    canvas.width,
    canvas.height
  );

  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {

    let r = d[i];
    let g = d[i + 1];
    let b = d[i + 2];

    if (isSkin(r, g, b)) {

      // 👉 只做「柔和混色」，不做 blur
      d[i]     = r + (target[0] - r) * t;
      d[i + 1] = g + (target[1] - g) * t;
      d[i + 2] = b + (target[2] - b) * t;
    }
  }

  ctx.putImageData(img, 0, 0);
}

// =======================
// 🎚 slider 即時更新
// =======================
slider.oninput = renderBeauty;

// =======================
// 🔙 重拍
// =======================
document.getElementById("backBtn").onclick = () => {
  editorView.style.display = "none";
  cameraView.style.display = "block";
};
</script>

</body>
</html>
