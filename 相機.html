// 🌸 更高級：保邊磨皮 + 局部膚色
function beauty(img, w, h, strength){

  const d = img.data;

  // 👉 先備份原圖（很重要！避免越修越糊）
  const original = new Uint8ClampedArray(d);

  function skin(r,g,b){
    return r>70 && g>40 && b>30;
  }

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      let i=(y*w+x)*4;

      let r=d[i], g=d[i+1], b=d[i+2];

      if(!skin(r,g,b)) continue;

      // ===== ① 保邊「磨皮」（不是 blur）=====
      let avgR=0,avgG=0,avgB=0,c=0;

      for(let dy=-1;dy<=1;dy++){
        for(let dx=-1;dx<=1;dx++){

          let ni=((y+dy)*w+(x+dx))*4;

          avgR+=original[ni];
          avgG+=original[ni+1];
          avgB+=original[ni+2];
          c++;
        }
      }

      avgR/=c; avgG/=c; avgB/=c;

      // ===== ② 膚色統一（但不過曝）=====
      const target=[255,235,238];

      let tr=r+(target[0]-r)*strength;
      let tg=g+(target[1]-g)*strength;
      let tb=b+(target[2]-b)*strength;

      // ===== ③ 混合（關鍵）=====
      d[i]   = (avgR*0.6 + tr*0.4);
      d[i+1] = (avgG*0.6 + tg*0.4);
      d[i+2] = (avgB*0.6 + tb*0.4);
    }
  }

  return img;
}
