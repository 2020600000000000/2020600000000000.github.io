<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧美顏相機網頁系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .header-title { font-size: 32px; font-weight: bold; margin-bottom: 30px; text-align: center; color: #000; }
        .camera-stage { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        .countdown-overlay { font-size: 48px; font-weight: bold; color: red; margin-bottom: 15px; height: 60px; }
        .viewfinders { display: flex; gap: 20px; width: 100%; justify-content: center; margin-bottom: 20px; }
        .viewfinder-box { width: 420px; height: 500px; background-color: #8e8e8e; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-size: 28px; font-weight: bold; position: relative; overflow: hidden; }
        .viewfinder-box canvas, .viewfinder-box video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder-label { position: absolute; z-index: 10; pointer-events: none; text-shadow: 1px 1px 5px rgba(255,255,255,0.8); }
        .filter-bar { width: 100%; background-color: #8e8e8e; padding: 25px; border-radius: 8px; text-align: center; font-size: 26px; font-weight: bold; color: #000; margin-bottom: 20px; cursor: pointer; transition: background 0.2s; }
        .filter-bar:hover { background-color: #7a7a7a; }
        .edit-stage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
        .preview-box { width: 500px; height: 500px; background-color: #8e8e8e; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; color: #000; font-size: 32px; position: relative; overflow: hidden; }
        .preview-box canvas { width: 100%; height: 100%; object-fit: cover; }
        .menu-row { display: flex; gap: 15px; justify-content: center; width: 100%; margin-bottom: 20px; }
        .btn-item { width: 100px; height: 65px; background-color: #8e8e8e; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-item.active { background-color: #555555; color: #fff; }
        .sub-panel { width: 100%; max-width: 500px; display: none; flex-direction: column; align-items: flex-start; margin-bottom: 20px; padding: 10px; }
        .sub-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; background-color: #8e8e8e; padding: 6px 20px; border-radius: 8px; }
        .slider-input { width: 100%; margin: 15px 0; height: 4px; background: #000; outline: none; -webkit-appearance: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #000; cursor: pointer; }
        .confirm-btn { align-self: flex-end; width: 50px; height: 50px; background-color: #b5b5b5; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; border: 2px solid #000; margin-top: 10px; }
        #hidden-video { display: none; }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay playsinline muted></video>

    <div id="stage-capture" class="camera-stage">
        <div class="header-title">智慧美顏相機系統</div>
        <div id="countdown" class="countdown-overlay">系統初始化中，請稍候...</div>
        
        <div class="viewfinders">
            <div class="viewfinder-box">
                <span class="viewfinder-label">原鏡頭</span>
                <canvas id="canvas-raw"></canvas>
            </div>
            <div class="viewfinder-box">
                <span class="viewfinder-label" style="text-align:center; top:40%;">修圖後<br><span style="font-size:16px; font-weight:normal;">(揮手切換濾鏡.比YA黃金比例輔助<br>第2次YA取消)</span></span>
                <canvas id="canvas-live-fx"></canvas>
            </div>
        </div>
        
        <div class="filter-bar" id="filter-toggle-bar" onclick="manualNextFilter()">
            濾鏡切換 (當前濾鏡: <span id="current-filter-name">無</span>)
        </div>
    </div>

    <div id="stage-edit" class="edit-stage">
        <div class="preview-box">
            <canvas id="canvas-edit-preview"></canvas>
        </div>
        
        <div class="menu-row">
            <button class="btn-item" onclick="switchSubPanel('panel-whiten')">美白</button>
            <button class="btn-item" onclick="switchSubPanel('panel-smooth')">磨皮</button>
            <button class="btn-item" onclick="switchSubPanel('panel-makeup')">妝容</button>
            <button class="btn-item" onclick="switchSubPanel('panel-sticker')">貼紙</button>
        </div>

        <div id="panel-whiten" class="sub-panel">
            <div class="sub-title">美白</div>
            <input type="range" id="slider-whiten" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>

        <div id="panel-smooth" class="sub-panel">
            <div class="sub-title">磨皮</div>
            <input type="range" id="slider-smooth" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>

        <div id="panel-makeup" class="sub-panel">
            <div class="sub-title">妝容</div>
            <div class="menu-row" style="justify-content: flex-start;">
                <button class="btn-item" onclick="setMakeup('korean')">韓系</button>
                <button class="btn-item" onclick="setMakeup('japanese')">日系</button>
                <button class="btn-item" onclick="setMakeup('taiwanese')">歌仔戲</button>
                <button class="btn-item" onclick="setMakeup('european')">歐式</button>
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>

        <div id="panel-sticker" class="sub-panel">
            <div class="sub-title">貼紙</div>
            <div class="menu-row" style="justify-content: flex-start; gap: 10px; flex-wrap: wrap;">
                <button class="btn-item" style="width:70px; height:70px;" onclick="setSticker('glasses')">
                    <svg width="50" height="30" viewBox="0 0 100 40"><circle cx="25" cy="20" r="15" stroke="black" stroke-width="3" fill="none"/><circle cx="75" cy="20" r="15" stroke="black" stroke-width="3" fill="none"/><line x1="40" y1="20" x2="60" y2="20" stroke="black" stroke-width="3"/></svg>
                </button>
                <button class="btn-item" style="width:70px; height:70px;" onclick="setSticker('ears')">
                    <svg width="50" height="40" viewBox="0 0 100 60"><polygon points="10,50 30,10 50,50" fill="pink" stroke="black" stroke-width="2"/><polygon points="50,50 70,10 90,50" fill="pink" stroke="black" stroke-width="2"/></svg>
                </button>
            </div>
            <button class="confirm-btn" onclick="saveToPhoto()">✓</button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasRaw = document.getElementById('canvas-raw');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');
        
        const ctxRaw = canvasRaw.getContext('2d');
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let currentFilterIndex = 0;
        const filters = ['無', '復古明亮', '浪漫粉紅', '冷調青翠', '高級灰調', '日系清新', '溫暖陽光', '經典黑白', '戲劇張力', '極光幻彩', '暮色暖橘'];
        
        let showGoldenRatio = false; 
        let yaCounter = 0;           
        let lastYaTime = 0;          
        let isCountingDown = false;  
        let capturedBlobImage = null;

        let currentMakeup = 'none';
        let currentSticker = 'none';
        let faceLandmarksData = null; 

        function initCanvasSize() {
            [canvasRaw, canvasLiveFx, canvasEdit].forEach(canvas => {
                canvas.width = 420;
                canvas.height = 500;
            });
        }
        initCanvasSize();

        // 修正一：優先調用鏡頭，確保不論 AI 能不能跑，畫面都不會是黑的
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    // 啟動原生基本渲染循環（先讓畫面動起來）
                    startBaseCameraLoop();
                    // 在背景非同步載入 AI 模型
                    initMediaPipeAI();
                });
            })
            .catch(err => {
                document.getElementById('countdown').innerText = "鏡頭開啟失敗";
                alert("無法開啟視訊鏡頭，請確認沒有被其他軟體(如 LINE)佔用，或嘗試更換瀏覽器：" + err);
            });

        // 基礎鏡頭渲染（保證黑畫面不會發生）
        function startBaseCameraLoop() {
            const render = () => {
                if (videoElement.readyState >= 2) {
                    ctxRaw.drawImage(videoElement, 0, 0, canvasRaw.width, canvasRaw.height);
                    ctxLive.drawImage(videoElement, 0, 0, canvasLiveFx.width, canvasLiveFx.height);
                    applyLiveFilter(ctxLive);
                    if (showGoldenRatio) drawGoldenRatioLines(ctxLive);
                }
                requestAnimationFrame(render);
            };
            requestAnimationFrame(render);
        }

        // 修正二：改用明確的 cdnjs 替代路徑，避免 MediaPipe 載入死鎖
        let handsAI = null;
        let faceMeshAI = null;
        
        function initMediaPipeAI() {
            handsAI = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
            });
            handsAI.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
            handsAI.onResults(onHandResults);

            faceMeshAI = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`
            });
            faceMeshAI.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
            faceMeshAI.onResults(onFaceResults);

            // 修正三：優化 AI 處理線程，防止兩個同時 send 造成卡死
            let isProcessing = false;
            setInterval(async () => {
                if (videoElement.readyState >= 2 && !isProcessing) {
                    isProcessing = true;
                    try {
                        await handsAI.send({ image: videoElement });
                        await faceMeshAI.send({ image: videoElement });
                        document.getElementById('countdown').innerText = isCountingDown ? document.getElementById('countdown').innerText : "✨ AI 手勢辨識已就緒";
                    } catch (e) {
                        console.log("AI 偵測忙碌中...");
                    }
                    isProcessing = false;
                }
            }, 100); // 每 100 毫秒執行一次輕量辨識
        }

        let lastHandX = null;
        let waveCount = 0;
        let lastWaveTime = 0;

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;
            const landmarks = results.multiHandLandmarks[0];
            const now = Date.now();

            if (detectWaveGesture(landmarks, now)) manualNextFilter();
            if (detectVSign(landmarks) && (now - lastYaTime > 2000)) {
                lastYaTime = now;
                showGoldenRatio = !showGoldenRatio;
            }
            if (detectOKGesture(landmarks) && !isCountingDown) startPhotoCountdown();
        }

        function onFaceResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                faceLandmarksData = results.multiFaceLandmarks[0];
            }
        }

        function detectWaveGesture(landmarks, now) {
            const wristX = landmarks[0].x;
            if (lastHandX === null) { lastHandX = wristX; return false; }
            const diff = wristX - lastHandX;
            lastHandX = wristX;
            if (Math.abs(diff) > 0.08) {
                if (now - lastWaveTime < 1000) {
                    lastWaveTime = now;
                    return true;
                }
                lastWaveTime = now;
            }
            return false;
        }

        function detectVSign(landmarks) {
            return (landmarks[8].y < landmarks[6].y && 
                    landmarks[12].y < landmarks[10].y && 
                    landmarks[16].y > landmarks[14].y && 
                    landmarks[20].y > landmarks[18].y);
        }

        function detectOKGesture(
