<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>只美白皮膚相機</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#btn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 12px 18px;
  font-size: 16px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<button id="btn">📸 拍照</button>

<!-- 人像分割 -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🧍 人像分割
const segmentation = new SelfieSegmentation({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
});

segmentation.setOptions({
  modelSelection: 1
});

// 🎯 判斷「是否像皮膚顏色」
function isSkin(r, g, b) {
  // 簡化皮膚色範圍（亞洲膚色也適用）
  return (
    r > 95 && g > 40 && b > 20 &&
    Math.max(r, g, b) - Math.min(r, g, b) > 15 &&
    Math.abs(r - g) > 15 &&
    r > g && r > b
  );
}

segmentation.onResults((results) => {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  const maskCanvas = document.createElement("canvas");
  maskCanvas.width = canvas.width;
  maskCanvas.height = canvas.height;

  const maskCtx = maskCanvas.getContext("2d");
  maskCtx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);

  const maskData = maskCtx.getImageData(0, 0, canvas.width, canvas.height).data;

  for (let i = 0; i < data.length; i += 4) {

    const isPerson = maskData[i] > 50;

    if (!isPerson) continue;

    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    // 👉 只處理「皮膚色」
    if (isSkin(r, g, b)) {
      data[i]     = Math.min(255, r * 1.08); // 只提亮皮膚
      data[i + 1] = Math.min(255, g * 1.08);
      data[i + 2] = Math.min(255, b * 1.08);
    }
  }

  ctx.putImageData(imageData, 0, 0);
});

// 📷 相機
const camera = new Camera(video, {
  onFrame: async () => {
    await segmentation.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

// 📸 拍照
document.getElementById("btn").addEventListener("click", () => {
  const link = document.createElement("a");
  link.download = "skin_beauty.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});
</script>

</body>
</html>
