<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>臉+脖子自然美白</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  text-align: center;
}

video, canvas {
  width: 100%;
  max-height: 80vh;
  object-fit: contain;
  background: black;
}

#controls {
  position: fixed;
  bottom: 10px;
  width: 100%;
  color: white;
}

button, input {
  margin: 5px;
  padding: 10px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="controls">
  <button id="snap">📸 拍照</button>
  <button id="download">⬇️ 下載</button>
  <br>
  ✨ 美白強度
  <input id="slider" type="range" min="0" max="1" step="0.01" value="0.25">
</div>

<!-- FaceMesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");

let landmarks = null;

// 📷 相機
const camera = new Camera(video, {
  onFrame: async () => {},
  width: 640,
  height: 480
});
camera.start();

// 🤖 FaceMesh
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

faceMesh.onResults((results) => {
  if (results.multiFaceLandmarks?.length > 0) {
    landmarks = results.multiFaceLandmarks[0];
  }
});

// 🎯 拍照
document.getElementById("snap").onclick = async () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  // 先丟給 FaceMesh 再修（簡化：用最後一幀 landmarks）
  applyBeauty();
};

// ✨ 更自然的「混合提亮」
function blendLighten(value, strength) {
  return value + (255 - value) * strength;
}

// 📍 判斷臉 + 脖子區域
function isFaceOrNeck(x, y, w, h) {
  if (!landmarks) return false;

  const xs = landmarks.map(p => p.x * w);
  const ys = landmarks.map(p => p.y * h);

  const minX = Math.min(...xs);
  const maxX = Math.max(...xs);
  const minY = Math.min(...ys);
  const maxY = Math.max(...ys);

  // 👉 臉區
  const face = (
    x >= minX && x <= maxX &&
    y >= minY && y <= maxY
  );

  // 👉 脖子（往下延伸）
  const neck = (
    x >= minX && x <= maxX &&
    y > maxY && y < maxY + (maxY - minY) * 0.6
  );

  return face || neck;
}

// ✨ 修圖
function applyBeauty() {
  const strength = parseFloat(slider.value);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {

      const i = (y * canvas.width + x) * 4;

      if (!isFaceOrNeck(x, y, canvas.width, canvas.height)) continue;

      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      // 🌿 更自然的提亮（避免過曝）
      const s = strength * 0.6;

      data[i]     = blendLighten(r, s);
      data[i + 1] = blendLighten(g, s);
      data[i + 2] = blendLighten(b, s);
    }
  }

  ctx.putImageData(imageData, 0, 0);
}

// ⬇️ 下載
document.getElementById("download").onclick = () => {
  const link = document.createElement("a");
  link.download = "face_neck_beauty.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};
</script>

</body>
</html>
