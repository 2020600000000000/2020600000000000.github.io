<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>穩定美顏App</title>

<style>
body{margin:0;background:black;font-family:sans-serif;}
#camera,#editor{position:absolute;width:100%;height:100%;}
video,canvas{width:100%;height:100%;object-fit:cover;}

#btn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:15px;
  font-size:18px;
}

#ui{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  color:white;
}

#editor{display:none;}
input{width:200px;}
button{padding:10px;margin:5px;}
</style>
</head>

<body>

<!-- 📷 CAMERA -->
<div id="camera">
  <video id="video" autoplay playsinline></video>
  <button id="snap">📸 拍照</button>
</div>

<!-- 🎨 EDITOR -->
<div id="editor">
  <canvas id="canvas"></canvas>

  <div id="ui">
    ✨ 美顏強度
    <input id="slider" type="range" min="0" max="1" step="0.01" value="0.5">
    <button id="back">🔙 返回</button>
  </div>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const camera=document.getElementById("camera");
const editor=document.getElementById("editor");

const slider=document.getElementById("slider");

let imgData=null;

// 📷 開相機（穩定版）
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  video.srcObject=stream;
})
.catch(err=>{
  alert("相機開啟失敗："+err);
});

// 📸 拍照 + 切頁（一定會動）
document.getElementById("snap").onclick=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  imgData=ctx.getImageData(0,0,canvas.width,canvas.height);

  camera.style.display="none";
  editor.style.display="block";
};

// 🎯 更穩定膚色判斷
function isSkin(r,g,b){
  return r>70 && g>40 && b>30;
}

// 🌸 膚色目標（粉嫩）
const target=[255,235,238];

// ✨ 修圖（一定有變化）
function render(){
  if(!imgData) return;

  let t=parseFloat(slider.value);

  let d=new Uint8ClampedArray(imgData.data);
  let w=canvas.width;

  for(let i=0;i<d.length;i+=4){

    let r=d[i],g=d[i+1],b=d[i+2];

    if(isSkin(r,g,b)){
      d[i]=r+(target[0]-r)*t;
      d[i+1]=g+(target[1]-g)*t;
      d[i+2]=b+(target[2]-b)*t;
    }
  }

  let newImg=new ImageData(d,canvas.width,canvas.height);
  ctx.putImageData(newImg,0,0);
}

// 🎚 slider 一定有效
slider.oninput=render;

// 🔙 返回拍照
document.getElementById("back").onclick=()=>{
  editor.style.display="none";
  camera.style.display="block";
};

// 初始 render（避免空白）
setInterval(render,100);

</script>

</body>
</html>
