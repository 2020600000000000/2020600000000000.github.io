<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 手機雙鏡頭即時黃金重塑相機</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 歡迎頁 */
        .intro-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; padding: 30px; text-align: center; background: #1c1c1e; position: absolute; z-index: 100; }
        .intro-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .intro-desc { font-size: 14px; color: #aeaea2; margin-bottom: 40px; line-height: 1.6; text-align: left; background: #2c2c2e; padding: 15px; border-radius: 12px; }
        .start-btn { background-color: #0071e3; color: #fff; border: none; padding: 16px 50px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; }

        /* 拍照舞台 */
        .camera-stage { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; position: relative; }
        .status-top { width: 90%; text-align: center; padding: 10px; font-size: 13px; color: #fff; background: rgba(0,0,0,0.75); position: absolute; top: 15px; z-index: 50; font-weight: bold; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* 手機雙鏡頭對比觀景窗 */
        .viewfinders-split { width: 100vw; height: 68vh; display: flex; flex-direction: row; gap: 4px; background: #000; padding: 4px; box-sizing: border-box; }
        .viewfinder-box { flex: 1; height: 100%; position: relative; background: #1c1c1e; border-radius: 12px; overflow: hidden; }
        .viewfinder-box canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .viewfinder-label { position: absolute; z-index: 10; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; border: 1px solid rgba(255,255,255,0.2); }

        /* 下方資訊欄 */
        .control-panel { width: 100vw; height: 32vh; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; gap: 8px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
        .filter-status-row { display: flex; gap: 10px; width: 90%; justify-content: space-around; }
        .filter-indicator { font-size: 12px; background: #2c2c2e; padding: 6px 14px; border-radius: 20px; color: #fff; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .filter-indicator.active-fx { background: #0071e3; border-color: #0071e3; }
        .gesture-tips { font-size: 12px; color: #8e8e93; text-align: center; line-height: 1.5; background: #1c1c1e; padding: 8px 16px; border-radius: 14px; width: 90%; }

        /* 後製階段 */
        .edit-stage { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; background: #1c1c1e; overflow-y: auto; padding: 15px; }
        .preview-box { width: 100%; max-width: 360px; aspect-ratio: 4/5; background-color: #000; border-radius: 14px; margin-bottom: 12px; position: relative; overflow: hidden; touch-action: none; }
        .preview-box canvas { width: 100%; height: 100%; object-fit: cover; }
        
        /* 修圖頁選單 */
        .menu-row { display: flex; gap: 6px; overflow-x: auto; width: 100%; padding: 5px 0; margin-bottom: 10px; }
        .btn-item { flex: 0 0 auto; padding: 10px 16px; background-color: #2c2c2e; border-radius: 20px; font-size: 13px; font-weight: bold; border: none; color: #fff; }
        .btn-item.active { background-color: #0071e3; }
        
        .sub-panel { width: 100%; display: none; flex-direction: column; align-items: center; background: #2c2c2e; padding: 15px; border-radius: 14px; margin-bottom: 12px; }
        .slider-container { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .slider-label { font-size: 12px; color: #aeaea2; margin-bottom: 2px; }
        .slider-input { width: 100%; height: 6px; background: #48484a; border-radius: 3px; -webkit-appearance: none; margin-bottom: 5px; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #0071e3; }
        
        .grid-layout { display: flex; gap: 8px; overflow-x: auto; width: 100%; }
        .grid-item { flex: 0 0 auto; padding: 10px 15px; background-color: #3a3a3c; border-radius: 15px; border: 2px solid transparent; color: #fff; font-size: 12px; font-weight: bold; }
        .grid-item.active { border-color: #0071e3; background-color: #0071e3; }
        
        .confirm-btn { width: 100%; max-width: 280px; padding: 14px; background-color: #34c759; color: white; border-radius: 25px; text-align: center; font-weight: bold; border: none; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay playsinline muted style="display: none;"></video>

    <div id="stage-intro" class="intro-stage">
        <div class="intro-title">AI 雙鏡手勢重塑相機</div>
        <div class="intro-desc">
            <b>🙌 隔空手勢功能說明：</b><br><br>
            1. <b>👌 比出 OK：</b> 觸發 5 秒拍照，自動擷取右側修改後的畫面。<br>
            2. <b>🖐️ 隔空揮手（方向感知）：</b><br>
             • 手掌<b>往左揮</b>：更換【左窗原鏡頭】的即時濾鏡。<br>
             • 手掌<b>往右揮</b>：更換【右窗預覽窗】的即時濾鏡。
        </div>
        <button class="start-btn" onclick="enterCameraStage()">開啟相機</button>
    </div>

    <div id="stage-capture" class="camera-stage">
        <div id="status-text" class="status-top">✋ AI 正在啟動，請對準前鏡頭...</div>
        
        <div class="viewfinders-split">
            <div class="viewfinder-box">
                <canvas id="canvas-raw"></canvas>
                <div class="viewfinder-label" id="raw-label">📷 左窗原廠鏡頭</div>
            </div>
            <div class="viewfinder-box">
                <canvas id="canvas-live-fx"></canvas>
                <div class="viewfinder-label" id="fx-label">✨ 右窗預覽畫面</div>
            </div>
        </div>
        
        <div class="control-panel">
            <div class="filter-status-row">
                <div class="filter-indicator" id="filter-left-name">左窗濾鏡：原圖</div>
                <div class="filter-indicator active-fx" id="filter-right-name">右窗濾鏡：原圖</div>
            </div>
            <div class="gesture-tips">
                🖐️ 往左揮手：換左窗濾鏡 | 🖐️ 往右揮手：換右窗濾鏡<br>
                👌 比 OK 手勢：觸發 5 秒倒數拍照
            </div>
        </div>
    </div>

    <div id="stage-edit" class="edit-stage">
        <div class="preview-box" id="preview-container">
            <canvas id="canvas-edit-preview"></canvas>
        </div>
        
        <div class="menu-row">
            <button class="btn-item active" id="btn-skin" onclick="openSubPanel('skin')">1.精準美白</button>
            <button class="btn-item" id="btn-smooth" onclick="openSubPanel('smooth')">2.智慧磨皮</button>
            <button class="btn-item" id="btn-makeup" onclick="openSubPanel('makeup')">3.主題妝容</button>
            <button class="btn-item" id="btn-sticker" onclick="openSubPanel('sticker')">4.創意貼紙</button>
            <button class="btn-item" id="btn-golden" onclick="openSubPanel('golden')">5.黃金比例</button>
        </div>

        <div id="panel-skin" class="sub-panel">
            <div class="slider-container">
                <div class="slider-label">臉部精準隔離美白強度：</div>
                <input type="range" id="slider-whiten" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
        </div>

        <div id="panel-smooth" class="sub-panel">
            <div class="slider-container">
                <div class="slider-label">臉部隔離磨皮柔焦強度：</div>
                <input type="range" id="slider-smooth-val" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
        </div>

        <div id="panel-makeup" class="sub-panel">
            <div class="grid-layout">
                <button class="grid-item mk-btn active" id="mk-none" onclick="setMakeup('none')">無妝容</button>
                <button class="grid-item mk-btn" id="mk-kr" onclick="setMakeup('kr')">韓系水光</button>
                <button class="grid-item mk-btn" id="mk-jp" onclick="setMakeup('jp')">日系大眼</button>
                <button class="grid-item mk-btn" id="mk-eu" onclick="setMakeup('eu')">歐式濃眉</button>
                <button class="grid-item mk-btn" id="mk-opera" onclick="setMakeup('opera')">歌仔戲</button>
            </div>
        </div>

        <div id="panel-sticker" class="sub-panel">
            <div class="grid-layout">
                <button class="grid-item stk-btn active" id="stk-none" onclick="setSticker('none')">無貼紙</button>
                <button class="grid-item stk-btn" id="stk-cat" onclick="setSticker('cat')">🐱 貓耳</button>
                <button class="grid-item stk-btn" id="stk-glasses" onclick="setSticker('glasses')">🕶️ 墨鏡</button>
                <button class="grid-item stk-btn" id="stk-crown" onclick="setSticker('crown')">👑 皇冠</button>
            </div>
            <div style="font-size:11px; color:#8e8e93; margin-top:8px; text-align:center;">
                💡 貼紙操作：單指拖移位置，雙指可捏合縮放與旋轉角度
            </div>
        </div>

        <div id="panel-golden" class="sub-panel">
            <div class="grid-layout" style="justify-content: center;">
                <button class="grid-item" id="reshape-toggle-btn" onclick="toggleGoldenReshape()" style="background:#ff9500; font-size:13px; padding:12px 24px; border-radius:20px;">
                    ✨ 開啟黃金比例臉型 (三庭五眼)
                </button>
            </div>
        </div>

        <button class="confirm-btn" onclick="savePhoto()">💾 儲存黃金比例照片</button>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasRaw = document.getElementById('canvas-raw');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');
        
        const ctxRaw = canvasRaw.getContext('2d');
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let leftFilterIndex = 0;
        let rightFilterIndex = 0;
        const filters = ['原圖', '浪漫粉紅', '日系清新', '冷調冷冽', '暖陽復古'];
        const filterCSSMap = { 
            '原圖': 'none', 
            '浪漫粉紅': 'hue-rotate(-10deg) saturate(1.2) brightness(1.05)', 
            '日系清新': 'brightness(1.15) contrast(0.9)', 
            '冷調冷冽': 'saturate(0.6) contrast(1.15) hue-rotate(15deg)', 
            '暖陽復古': 'sepia(0.25) saturate(1.3)' 
        };

        let faceLandmarksData = null;
        let lastHandX = null; let waveCooldown = false;
        let isCountingDown = false; let countdownTimer = null;
        let capturedCanvasBackup = document.createElement('canvas');

        // 修圖頁狀態
        let currentMakeup = 'none';
        let currentSticker = 'none';
        let isGoldenReshapeActive = false; 

        // 貼紙設定
        const stickerConfig = { 
            cat: { text: "🐱", baseSize: 75 }, 
            glasses: { text: "🕶️", baseSize: 70 },
            crown: { text: "👑", baseSize: 85 }
        };
        let stickerState = { x: 180, y: 140, scale: 1.0, rotation: 0 }; 

        // 手勢變數
        let isDragging = false;
        let startX = 0, startY = 0;
        let initialStickerX = 0, initialStickerY = 0;
        let isPinchRotating = false;
        let startDist = 0;
        let startAngle = 0;
        let initialScale = 1.0;
        let initialRotation = 0;

        function init() {
            canvasRaw.width = 240; canvasRaw.height = 320;
            canvasLiveFx.width = 240; canvasLiveFx.height = 320;
            canvasEdit.width = 360; canvasEdit.height = 450;
            initStickerAdvancedControls();

            // 防錯檢查：偵測是否在安全環境下打開
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                alert("⚠️ 偵測到非安全連線 (HTTP)！瀏覽器基於隱私規定，在此環境下「相機將完全無法開啟」。請務必部署至 https:// 網址測試。");
            }
        }
        window.addEventListener('DOMContentLoaded', init);

        function enterCameraStage() {
            // 檢查瀏覽器是否支援相機 API
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("❌ 您的瀏覽器不支援相機功能，或者身處不安全的 HTTP 環境。請換用 Chrome/Safari 並走 HTTPS 連線。");
                return;
            }

            document.getElementById('stage-intro').style.display = 'none';
            document.getElementById('stage-capture').style.display = 'flex';
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user", 
                    width: { ideal: 480 }, 
                    height: { ideal: 640 } 
                } 
            })
            .then(stream => {
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play().then(() => {
                        startRenderLoop();
                        initMediaPipe();
                    });
                };
            })
            .catch(err => {
                console.error("相機開啟失敗原因: ", err);
                // 提供給使用者的錯誤原因明確診斷
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    alert("❌ 相機開啟失敗：您拒絕了相機權限請求！請至瀏覽器設定中重新允許權限後重新整理網頁。");
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    alert("❌ 相機開啟失敗：找不到您的視訊鏡頭設備。");
                } else {
                    alert(`❌ 相機開啟失敗 (${err.name})：請確認其他應用程式是否佔用了相機，或換用內建瀏覽器開啟。`);
                }
            });
        }

        function startRenderLoop() {
            const render = () => {
                if (videoElement.readyState >= 2) {
                    canvasRaw.style.filter = filterCSSMap[filters[leftFilterIndex]];
                    canvasLiveFx.style.filter = filterCSSMap[filters[rightFilterIndex]];

                    ctxRaw.drawImage(videoElement, 0, 0, canvasRaw.width, canvasRaw.height);
                    ctxLive.drawImage(videoElement, 0, 0, canvasLiveFx.width, canvasLiveFx.height);
                }
                requestAnimationFrame(render);
            };
            requestAnimationFrame(render);
        }

        function initMediaPipe() {
            const status = document.getElementById('status-text');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.6 });
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handleHandGestures(results.multiHandLandmarks[0]);
                } else { lastHandX = null; }
            });

            const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    faceLandmarksData = results.multiFaceLandmarks[0];
                    if(!isCountingDown) {
                        status.innerText = "📷 隔空控制中。👌比OK拍照 | 🖐️揮手變更左右觀景窗濾鏡";
                    }
                } else { faceLandmarksData = null; }
            });

            let toggle = true;
            function aiLoop() {
                if (videoElement.readyState >= 2) {
                    let p = toggle ? hands.send({ image: videoElement }) : faceMesh.send({ image: videoElement });
                    toggle = !toggle;
                    p.then(() => requestAnimationFrame(aiLoop)).catch(() => requestAnimationFrame(aiLoop));
                } else { requestAnimationFrame(aiLoop); }
            }
            requestAnimationFrame(aiLoop);
        }

        function handleHandGestures(lm) {
            const status = document.getElementById('status-text');
            const isOk = (Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y) < 0.05) && (lm[12].y < lm[10].y) && (lm[16].y < lm[14].y);

            if (isOk && !isCountingDown) {
                isCountingDown = true;
                let count = 5;
                status.innerText = `👌 偵測到 OK！倒數 ${count} 秒拍照...`;
                countdownTimer = setInterval(() => {
                    count--;
                    status.innerText = `👌 偵測到 OK！倒數 ${count} 秒拍照...`;
                    if (count <= 0) {
                        clearInterval(countdownTimer);
                        status.innerText = "💥 拍照完成！";
                        setTimeout(triggerSnapshot, 300);
                    }
                }, 1000);
            }

            const currentX = lm[9].x;
            if (lastHandX !== null && !waveCooldown && !isCountingDown) {
                const delta = currentX - lastHandX;
                if (Math.abs(delta) > 0.07) {
                    waveCooldown = true;
                    if (delta > 0) {
                        rightFilterIndex = (rightFilterIndex + 1) % filters.length;
                        document.getElementById('filter-right-name').innerText = `右窗濾鏡：${filters[rightFilterIndex]}`;
                    } else {
                        leftFilterIndex = (leftFilterIndex + 1) % filters.length;
                        document.getElementById('filter-left-name').innerText = `左窗濾鏡：${filters[leftFilterIndex]}`;
                    }
                    setTimeout(() => { waveCooldown = false; }, 800);
                }
            }
            lastHandX = currentX;
        }

        function triggerSnapshot() {
            capturedCanvasBackup.width = canvasEdit.width;
            capturedCanvasBackup.height = canvasEdit.height;
            const bCtx = capturedCanvasBackup.getContext('2d');
            
            bCtx.translate(canvasEdit.width, 0);
            bCtx.scale(-1, 1);
            
            bCtx.filter = filterCSSMap[filters[rightFilterIndex]];
            bCtx.drawImage(videoElement, 0, 0, canvasEdit.width, canvasEdit.height);
            bCtx.filter = "none";

            document.getElementById('stage-capture').style.display = 'none';
            document.getElementById('stage-edit').style.display = 'flex';
            
            if (faceLandmarksData) {
                stickerState.x = (1 - faceLandmarksData[1].x) * canvasEdit.width;
                stickerState.y = faceLandmarksData[1].y * canvasEdit.height;
            }
            isCountingDown = false;
            openSubPanel('skin');
        }

        function openSubPanel(id) {
            document.querySelectorAll('.sub-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById('panel-' + id).style.display = 'flex';
            document.getElementById('btn-' + id).classList.add('active');
            applyEditEffects();
        }

        function setMakeup(m) { 
            currentMakeup = m; 
            document.querySelectorAll('.mk-btn').forEach(b => b.classList.toggle('active', b.id === 'mk-'+m));
            applyEditEffects();
        }
        
        function setSticker(s) { 
            currentSticker = s; 
            document.querySelectorAll('.stk-btn').forEach(b => b.classList.toggle('active', b.id === 'stk-'+s));
            applyEditEffects();
        }

        function toggleGoldenReshape() {
            isGoldenReshapeActive = !isGoldenReshapeActive;
            const btn = document.getElementById('reshape-toggle-btn');
            if (isGoldenReshapeActive) {
                btn.innerText = "✨ 黃金比例臉型：已開啟";
                btn.style.background = "#34c759";
            } else {
                btn.innerText = "✨ 開啟黃金比例臉型 (三庭五眼)";
                btn.style.background = "#ff9500";
            }
            applyEditEffects();
        }

        function getGoldenReshapedLandmarks(lm, w, h) {
            let newLm = lm.map(p => ({ x: (1 - p.x) * w, y: p.y * h })); 

            const pTop = newLm[10].y;     
            const pBrow = newLm[9].y;     
            const pSubnasal = newLm[2].y; 
            const pChin = newLm[152].y;   
            const fCenter = newLm[1].x;   

            const currentTotalLength = pChin - pTop;
            const idealCourtLen = currentTotalLength / 3; 

            const currentUpper = pBrow - pTop;
            const currentMiddle = pSubnasal - pBrow;
            const currentLower = pChin - pSubnasal;

            const idealTotalWidth = currentTotalLength / 1.618; 

            for (let i = 0; i < newLm.length; i++) {
                let pt = newLm[i];

                if (pt.y >= pTop && pt.y < pBrow) {
                    let ratio = (pt.y - pTop) / (currentUpper || 1);
                    pt.y = pTop + ratio * idealCourtLen;
                } else if (pt.y >= pBrow && pt.y < pSubnasal) {
                    let ratio = (pt.y - pBrow) / (currentMiddle || 1);
                    pt.y = (pTop + idealCourtLen) + ratio * idealCourtLen;
                } else if (pt.y >= pSubnasal && pt.y <= pChin) {
                    let ratio = (pt.y - pSubnasal) / (currentLower || 1);
                    pt.y = (pTop + idealCourtLen * 2) + ratio * idealCourtLen;
                }

                let dx = pt.x - fCenter;
                let widthScaleFactor = idealTotalWidth / (w * 0.68); 
                pt.x = fCenter + dx * widthScaleFactor * 0.96;
            }
            return newLm;
        }

        function drawMeshDeformation(ctx, origCanvas, origLm, targetLm, w, h) {
            const rows = 16; const cols = 12;
            ctx.clearRect(0, 0, w, h);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const srcX1 = (c / cols) * w; const srcY1 = (r / rows) * h;
                    const srcX2 = ((c + 1) / cols) * w; const srcY2 = ((r + 1) / rows) * h;

                    const getOffset = (sx, sy) => {
                        let nearestIdx = 1; let minDist = Infinity;
                        [10, 152, 234, 454, 1, 9, 2, 33, 263].forEach(idx => {
                            let oX = (1 - origLm[idx].x) * w; let oY = origLm[idx].y * h;
                            let d = Math.hypot(oX - sx, oY - sy);
                            if(d < minDist) { minDist = d; nearestIdx = idx; }
                        });
                        const weight = Math.max(0, 1 - (minDist / 140));
                        return { 
                            x: sx + (targetLm[nearestIdx].x - ((1 - origLm[nearestIdx].x) * w)) * weight, 
                            y: sy + (targetLm[nearestIdx].y - (origLm[nearestIdx].y * h)) * weight 
                        };
                    };

                    const p1 = getOffset(srcX1, srcY1); const p2 = getOffset(srcX2, srcY1);
                    const p3 = getOffset(srcX1, srcY2); const p4 = getOffset(srcX2, srcY2);

                    ctx.save(); ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.clip();
                    const t1 = (p2.x - p1.x) / (srcX2 - srcX1); const t2 = (p2.y - p1.y) / (srcX2 - srcX1);
                    const t3 = (p3.x - p1.x) / (srcY2 - srcY1); const t4 = (p3.y - p1.y) / (srcY2 - srcY1);
                    ctx.transform(t1, t2, t3, t4, p1.x - srcX1 * t1 - srcY1 * t3, p1.y - srcX1 * t2 - srcY1 * t4);
                    ctx.drawImage(origCanvas, 0, 0); ctx.restore();

                    ctx.save(); ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p4.x, p4.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.clip();
                    const t1b = (p4.x - p3.x) / (srcX2 - srcX1); const t2b = (p4.y - p3.y) / (srcX2 - srcX1);
                    const t3b = (p4.x - p2.x) / (srcY2 - srcY1); const t4b = (p4.y - p2.y) / (srcY2 - srcY1);
                    ctx.transform(t1b, t2b, t3b, t4b, p3.x - srcX1 * t1b - srcY2 * t3b, p3.y - srcX1 * t2b - srcY2 * t4b);
                    ctx.drawImage(origCanvas, 0, 0); ctx.restore();
                }
            }
        }

        function applyEditEffects() {
            if (!capturedCanvasBackup) return;
            const w = canvasEdit.width; const h = canvasEdit.height;
            ctxEdit.clearRect(0, 0, w, h);

            if (isGoldenReshapeActive && faceLandmarksData) {
                const targetPoints = getGoldenReshapedLandmarks(faceLandmarksData, w, h);
                drawMeshDeformation(ctxEdit, capturedCanvasBackup, faceLandmarksData, targetPoints, w, h);
            } else {
                ctxEdit.drawImage(capturedCanvasBackup, 0, 0);
            }

            if (!faceLandmarksData) return;

            const whitVal = parseInt(document.getElementById('slider-whiten').value);
            const smooVal = parseInt(document.getElementById('slider-smooth-val').value);

            if (whitVal > 0 || smooVal > 0) {
                let faceMaskCanvas = document.createElement('canvas');
                faceMaskCanvas.width = w; faceMaskCanvas.height = h;
                let mCtx = faceMaskCanvas.getContext('2d');
                mCtx.fillStyle = "white";
                mCtx.beginPath();
                [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                    let x = (1 - faceLandmarksData[idx].x) * w; let y = faceLandmarksData[idx].y * h;
                    if(i === 0) mCtx.moveTo(x, y); else mCtx.lineTo(x, y);
                });
                mCtx.closePath(); mCtx.fill();

                if (smooVal > 0) {
                    ctxEdit.save();
                    let smoothCanvas = document.createElement('canvas');
                    smoothCanvas.width = w; smoothCanvas.height = h;
                    smoothCanvas.getContext('2d').drawImage(canvasEdit, 0, 0);
                    ctxEdit.globalAlpha = 0.35 * (smooVal / 100); 
                    ctxEdit.shadowBlur = 14; ctxEdit.shadowColor = "#ffffff";
                    ctxEdit.drawImage(smoothCanvas, 0, 0);
                    ctxEdit.restore();
                }

                if (whitVal > 0) {
                    ctxEdit.save();
                    let whitenTemp = document.createElement('canvas');
                    whitenTemp.width = w; whitenTemp.height = h;
                    let wTCtx = whitenTemp.getContext('2d');
                    wTCtx.drawImage(faceMaskCanvas, 0, 0);
                    wTCtx.globalCompositeOperation = "source-in";
                    wTCtx.fillStyle = `rgba(255, 255, 255, ${whitVal / 260})`;
                    wTCtx.fillRect(0, 0, w, h);
                    ctxEdit.drawImage(whitenTemp, 0, 0);
                    ctxEdit.restore();
                }
            }

            drawThemedMakeup(ctxEdit, faceLandmarksData, w, h);

            if (currentSticker !== 'none') {
                const conf = stickerConfig[currentSticker];
                ctxEdit.save();
                ctxEdit.translate(stickerState.x, stickerState.y);
                ctxEdit.rotate(stickerState.rotation); 
                ctxEdit.font = `${conf.baseSize * stickerState.scale}px Arial`;
                ctxEdit.textAlign = 'center'; ctxEdit.textBaseline = 'middle';
                ctxEdit.fillText(conf.text, 0, 0);
                ctxEdit.restore();
            }
        }

        function drawThemedMakeup(ctx, lm, w, h) {
            if (currentMakeup === 'none') return;
            ctx.save();
            const getX = (idx) => (1 - lm[idx].x) * w;

            if (currentMakeup === 'kr') {
                ctx.fillStyle = "rgba(255, 60, 100, 0.38)";
                ctx.beginPath(); [61,146,91,181,84,17,314,405,321,375,291,415,308,324,318,402,317,14,87,178,88,95,78].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
            } else if (currentMakeup === 'jp') {
                ctx.fillStyle = "rgba(255, 110, 110, 0.25)";
                ctx.beginPath(); ctx.arc(getX(31), lm[31].y*h + 8, 16, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(getX(261), lm[261].y*h + 8, 16, 0, Math.PI * 2); ctx.fill();
            } else if (currentMakeup === 'eu') {
                ctx.strokeStyle = "rgba(50, 30, 20, 0.7)"; ctx.lineWidth = 3; ctx.lineCap = "round";
                ctx.beginPath(); [70, 63, 105, 66, 107].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.stroke();
                ctx.beginPath(); [300, 293, 334, 296, 336].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.stroke();
            } else if (currentMakeup === 'opera') {
                ctx.fillStyle = "rgba(235, 0, 45, 0.55)";
                ctx.beginPath(); [70,156,157,33,113,130,25].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.beginPath(); [300,383,384,263,342,359,255].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
            }
            ctx.restore();
        }

        function initStickerAdvancedControls() {
            const container = document.getElementById('preview-container');

            container.addEventListener('touchstart', (e) => {
                if (currentSticker === 'none') return;
                let rect = canvasEdit.getBoundingClientRect();
                
                if (e.touches.length === 1) {
                    let t = e.touches[0];
                    let canvasX = (t.clientX - rect.left) * (canvasEdit.width / rect.width);
                    let canvasY = (t.clientY - rect.top) * (canvasEdit.height / rect.height);
                    
                    if (Math.hypot(canvasX - stickerState.x, canvasY - stickerState.y) < 60) {
                        isDragging = true; startX = canvasX; startY = canvasY;
                        initialStickerX = stickerState.x; initialStickerY = stickerState.y;
                    }
                } else if (e.touches.length === 2) {
                    isDragging = false; isPinchRotating = true;
                    let t1 = e.touches[0]; let t2 = e.touches[1];
                    let dx = t2.clientX - t1.clientX; let dy = t2.clientY - t1.clientY;
                    startDist = Math.hypot(dx, dy); startAngle = Math.atan2(dy, dx);
                    initialScale = stickerState.scale; initialRotation = stickerState.rotation;
                }
            });

            container.addEventListener('touchmove', (e) => {
                let rect = canvasEdit.getBoundingClientRect();
                if (isDragging && e.touches.length === 1) {
                    let t = e.touches[0];
                    let canvasX = (t.clientX - rect.left) * (canvasEdit.width / rect.width);
                    let canvasY = (t.clientY - rect.top) * (canvasEdit.height / rect.height);
                    stickerState.x = initialStickerX + (canvasX - startX);
                    stickerState.y = initialStickerY + (canvasY - startY);
                    applyEditEffects();
                    e.preventDefault();
                } else if (isPinchRotating && e.touches.length === 2) {
                    let t1 = e.touches[0]; let t2 = e.touches[1];
                    let dx = t2.clientX - t1.clientX; let dy = t2.clientY - t1.clientY;
                    let newDist = Math.hypot(dx, dy);
                    if (startDist > 0) stickerState.scale = Math.max(0.4, Math.min(3.0, initialScale * (newDist / startDist)));
                    let newAngle = Math.atan2(dy, dx);
                    stickerState.rotation = initialRotation + (newAngle - startAngle);
                    applyEditEffects();
                    e.preventDefault();
                }
            });

            window.addEventListener('touchend', () => { isDragging = false; isPinchRotating = false; });
        }

        function savePhoto() { alert("🎉 照片已成功套用美學與後製效果並模擬儲存！"); }
    </script>
