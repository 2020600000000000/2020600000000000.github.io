<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 手機手勢黃金比例相機</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 歡迎頁 */
        .intro-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; padding: 30px; text-align: center; background: #1c1c1e; position: absolute; z-index: 100; }
        .intro-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .intro-desc { font-size: 14px; color: #aeaea2; margin-bottom: 40px; line-height: 1.6; text-align: left; background: #2c2c2e; padding: 15px; border-radius: 12px; }
        .start-btn { background-color: #0071e3; color: #fff; border: none; padding: 16px 50px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; }

        /* 拍照舞台 */
        .camera-stage { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; position: relative; }
        .status-top { width: 90%; text-align: center; padding: 10px; font-size: 14px; color: #fff; background: rgba(0,0,0,0.7); position: absolute; top: 15px; z-index: 50; font-weight: bold; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* 觀景窗 */
        .viewfinder-container { width: 100vw; height: 75vh; position: relative; background: #000; margin-top: 0; display: flex; align-items: center; justify-content: center; }
        /* 為了自拍直覺，必須將鏡頭畫面左右反轉(鏡像) */
        .viewfinder-container canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* 下方資訊欄 */
        .control-panel { width: 100vw; height: 25vh; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; gap: 10px; }
        .filter-indicator { font-size: 14px; background: #2c2c2e; padding: 6px 16px; border-radius: 20px; color: #34c759; font-weight: bold; }
        .gesture-tips { font-size: 12px; color: #8e8e93; text-align: center; line-height: 1.5; }

        /* 後製階段 */
        .edit-stage { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; background: #1c1c1e; overflow-y: auto; padding: 15px; }
        .preview-box { width: 100%; max-width: 360px; aspect-ratio: 4/5; background-color: #000; border-radius: 14px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .preview-box canvas { width: 100%; height: 100%; object-fit: cover; }
        
        .menu-row { display: flex; gap: 6px; overflow-x: auto; width: 100%; padding: 5px 0; margin-bottom: 10px; }
        .btn-item { flex: 0 0 auto; padding: 10px 16px; background-color: #2c2c2e; border-radius: 20px; font-size: 13px; font-weight: bold; border: none; color: #fff; }
        .btn-item.active { background-color: #0071e3; }
        
        .sub-panel { width: 100%; display: none; flex-direction: column; align-items: center; background: #2c2c2e; padding: 15px; border-radius: 14px; margin-bottom: 15px; }
        .slider-container { width: 100%; }
        .slider-input { width: 100%; height: 6px; background: #48484a; border-radius: 3px; -webkit-appearance: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #0071e3; }
        
        .grid-layout { display: flex; gap: 8px; overflow-x: auto; width: 100%; }
        .grid-item { flex: 0 0 auto; padding: 10px 15px; background-color: #3a3a3c; border-radius: 15px; border: 2px solid transparent; color: #fff; font-size: 12px; font-weight: bold; }
        .grid-item.active { border-color: #0071e3; background-color: #0071e3; }
        .confirm-btn { width: 100%; max-width: 280px; padding: 14px; background-color: #34c759; color: white; border-radius: 25px; text-align: center; font-weight: bold; border: none; font-size: 16px; }
        
        #hidden-video { display: none; }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay playsinline muted></video>

    <div id="stage-intro" class="intro-stage">
        <div class="intro-title">AI 手動操控：手勢相機</div>
        <div class="intro-desc">
            <b>🙌 完美還原三大手機手勢控制：</b><br><br>
            1. <b>✌️ 比出 YA：</b> 臉部直接縮小拉長，1秒重塑成「黃金比例瓜子臉」。再比一次 YA 即可取消，回復原狀！<br>
            2. <b>👌 比出 OK：</b> 觸發 5 秒拍照倒數，快門自動捕捉。<br>
            3. <b>🖐️ 隔空揮手：</b> 手掌在鏡頭前左右大範圍晃動，直接切換快門濾鏡。<br><br>
            *請確保在光線充足環境下使用，並讓手掌與臉部同時入鏡。
        </div>
        <button class="start-btn" onclick="enterCameraStage()">開啟手勢相機</button>
    </div>

    <div id="stage-capture" class="camera-stage">
        <div id="status-text" class="status-top">✋ 請對準前鏡頭... AI 正在啟動</div>
        
        <div class="viewfinder-container">
            <canvas id="canvas-live-fx"></canvas>
        </div>
        
        <div class="control-panel">
            <div class="filter-indicator" id="filter-name">濾鏡：原圖</div>
            <div class="gesture-tips">
                ✌️ 比YA：切換黃金比例 | 👌 比OK：5秒拍照<br>🖐️ 揮手：換濾鏡
            </div>
        </div>
    </div>

    <div id="stage-edit" class="edit-stage">
        <div class="preview-box">
            <canvas id="canvas-edit-preview"></canvas>
        </div>
        
        <div class="menu-row">
            <button class="btn-item" id="btn-skin" onclick="openSubPanel('skin')">精準美白</button>
            <button class="btn-item" id="btn-smooth" onclick="openSubPanel('smooth')">智慧磨皮</button>
            <button class="btn-item" id="btn-makeup" onclick="openSubPanel('makeup')">主題妝容</button>
            <button class="btn-item" id="btn-sticker" onclick="openSubPanel('sticker')">創意貼紙</button>
        </div>

        <div id="panel-skin" class="sub-panel">
            <div class="slider-container">
                <input type="range" id="slider-whiten" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
        </div>

        <div id="panel-smooth" class="sub-panel">
            <div class="slider-container">
                <input type="range" id="slider-smooth-val" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
        </div>

        <div id="panel-makeup" class="sub-panel">
            <div class="grid-layout">
                <button class="grid-item mk-btn active" id="mk-none" onclick="setMakeup('none')">無妝容</button>
                <button class="grid-item mk-btn" id="mk-kr" onclick="setMakeup('kr')">韓系水光</button>
                <button class="grid-item mk-btn" id="mk-jp" onclick="setMakeup('jp')">日系大眼</button>
                <button class="grid-item mk-btn" id="mk-opera" onclick="setMakeup('opera')">歌仔戲</button>
            </div>
        </div>

        <div id="panel-sticker" class="sub-panel">
            <div class="grid-layout">
                <button class="grid-item stk-btn active" id="stk-none" onclick="setSticker('none')">無貼紙</button>
                <button class="grid-item stk-btn" id="stk-cat" onclick="setSticker('cat')">🐱 貓耳</button>
                <button class="grid-item stk-btn" id="stk-glasses" onclick="setSticker('glasses')">🕶️ 墨鏡</button>
            </div>
        </div>

        <button class="confirm-btn" onclick="savePhoto()">💾 儲存黃金比例照片</button>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');
        
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let currentFilterIndex = 0;
        const filters = ['原圖', '浪漫粉紅', '日系清新', '冷調冷冽', '暖陽復古'];
        const filterCSSMap = { '原圖': 'none', '浪漫粉紅': 'hue-rotate(-10deg) saturate(1.2) brightness(1.05)', '日系清新': 'brightness(1.15) contrast(0.9)', '冷調冷冽': 'saturate(0.6) contrast(1.15) hue-rotate(15deg)', '暖陽復古': 'sepia(0.25) saturate(1.3)' };

        let faceLandmarksData = null;
        let isReshapeActive = false;
        let yaHandInFrame = false;
        let lastHandX = null; let waveCooldown = false;
        let isCountingDown = false; let countdownTimer = null;
        let capturedCanvasBackup = null;

        // 後製設定
        let currentMakeup = 'none'; let currentSticker = 'none';
        const stickerConfig = { cat: { text: "🐱", size: 80 }, glasses: { text: "🕶️", size: 70 } };
        let stickerState = { x: 180, y: 180, scale: 1.0 };
        let isDragging = false; let dragStartX = 0; let dragStartY = 0; let initStickerX = 0; let initStickerY = 0;

        function init() {
            canvasLiveFx.width = 360; canvasLiveFx.height = 450;
            canvasEdit.width = 360; canvasEdit.height = 450;
        }
        init();

        function enterCameraStage() {
            document.getElementById('stage-intro').style.display = 'none';
            document.getElementById('stage-capture').style.display = 'flex';
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 480, height: 640 } })
                .then(stream => {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        startRenderLoop();
                        initMediaPipe();
                    });
                }).catch(err => alert("授權失敗，請用 Safari/Chrome 開啟並允許相機權限"));
        }

        function startRenderLoop() {
            const tempCanvas = document.createElement('canvas'); tempCanvas.width = 360; tempCanvas.height = 450;
            const tempCtx = tempCanvas.getContext('2d');

            const render = () => {
                if (videoElement.readyState >= 2) {
                    canvasLiveFx.style.filter = filterCSSMap[filters[currentFilterIndex]];

                    if (isReshapeActive && faceLandmarksData) {
                        tempCtx.drawImage(videoElement, 0, 0, 360, 450);
                        const targetPoints = getReshapedLandmarks(faceLandmarksData, 100, 360, 450);
                        drawMeshDeformation(ctxLive, tempCanvas, faceLandmarksData, targetPoints, 360, 450);
                    } else {
                        ctxLive.drawImage(videoElement, 0, 0, 360, 450);
                    }
                }
                requestAnimationFrame(render);
            };
            requestAnimationFrame(render);
        }

        function initMediaPipe() {
            const status = document.getElementById('status-text');

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.6 });
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handleHandGestures(results.multiHandLandmarks[0]);
                } else { yaHandInFrame = false; lastHandX = null; }
            });

            const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5 });
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    faceLandmarksData = results.multiFaceLandmarks[0];
                    if(!isCountingDown) {
                        status.innerText = isReshapeActive ? "💥 黃金比例變臉中 (比YA可還原)" : "✨ 正常臉型 (比YA啟動黃金變臉)";
                    }
                } else { faceLandmarksData = null; }
            });

            let toggle = true;
            function aiLoop() {
                if (videoElement.readyState >= 2) {
                    let p = toggle ? hands.send({ image: videoElement }) : faceMesh.send({ image: videoElement });
                    toggle = !toggle;
                    p.then(() => requestAnimationFrame(aiLoop)).catch(() => requestAnimationFrame(aiLoop));
                } else { requestAnimationFrame(aiLoop); }
            }
            requestAnimationFrame(aiLoop);
        }

        function handleHandGestures(lm) {
            const status = document.getElementById('status-text');
            // 由於前鏡頭鏡像反轉，左右手骨骼位置做對稱校正
            const isYa = (lm[8].y < lm[6].y) && (lm[12].y < lm[10].y) && (lm[16].y > lm[14].y) && (lm[20].y > lm[18].y);
            const isOk = (Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y) < 0.05) && (lm[12].y < lm[10].y) && (lm[16].y < lm[14].y);

            // 1. 比 YA 觸發/取消即時變臉
            if (isYa) {
                if (!yaHandInFrame) {
                    isReshapeActive = !isReshapeActive;
                    yaHandInFrame = true;
                    status.innerText = isReshapeActive ? "✌️ 偵測到 YA：開啟黃金臉型！" : "✌️ 偵測到 YA：恢復正常臉型！";
                }
            } else { yaHandInFrame = false; }

            // 2. 比 OK 倒數拍照
            if (isOk && !isCountingDown) {
                isCountingDown = true;
                let count = 5;
                status.innerText = `👌 偵測到 OK！倒數 ${count} 秒拍照...`;
                countdownTimer = setInterval(() => {
                    count--;
                    status.innerText = `👌 倒數 ${count} 秒...`;
                    if (count <= 0) {
                        clearInterval(countdownTimer);
                        status.innerText = "💥 拍照！";
                        setTimeout(triggerSnapshot, 300);
                    }
                }, 1000);
            }

            // 3. 揮手換濾鏡
            const currentX = lm[9].x;
            if (lastHandX !== null && !waveCooldown && !isCountingDown) {
                const delta = currentX - lastHandX;
                if (Math.abs(delta) > 0.08) {
                    waveCooldown = true;
                    currentFilterIndex = delta > 0 ? (currentFilterIndex + 1) % filters.length : (currentFilterIndex - 1 + filters.length) % filters.length;
                    document.getElementById('filter-name').innerText = `濾鏡：${filters[currentFilterIndex]}`;
                    setTimeout(() => { waveCooldown = false; }, 800);
                }
            }
            lastHandX = currentX;
        }

        function triggerSnapshot() {
            capturedCanvasBackup = document.createElement('canvas'); capturedCanvasBackup.width = 360; capturedCanvasBackup.height = 450;
            const bCtx = capturedCanvasBackup.getContext('2d');
            
            // 將畫布做鏡像翻轉儲存，這樣拍出來的照片才不會左右相反
            bCtx.translate(360, 0); bCtx.scale(-1, 1);
            bCtx.drawImage(canvasLiveFx, 0, 0, 360, 450);

            document.getElementById('stage-capture').style.display = 'none';
            document.getElementById('stage-edit').style.display = 'flex';
            
            if (faceLandmarksData) {
                stickerState.x = (1 - faceLandmarksData[1].x) * canvasEdit.width;
                stickerState.y = faceLandmarksData[1].y * canvasEdit.height;
            }
            openSubPanel('skin'); initStickerMobileDrag();
        }

        function openSubPanel(id) {
            document.querySelectorAll('.sub-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).style.display = 'flex';
            document.getElementById('btn-' + id).classList.add('active');
            applyEditEffects();
        }

        function setMakeup(m) { currentMakeup = m; document.querySelectorAll('.mk-btn').forEach(b => b.classList.toggle('active', b.id === 'mk-'+m)); applyEditEffects(); }
        function setSticker(s) { currentSticker = s; document.querySelectorAll('.stk-btn').forEach(b => b.classList.toggle('active', b.id === 'stk-'+s)); applyEditEffects(); }

        function getReshapedLandmarks(lm, intensity, w, h) {
            let newLm = lm.map(p => ({ x: p.x * w, y: p.y * h }));
            const k = intensity / 100;
            const fCenter = newLm[1].x; const pTop = newLm[10].y; const pMid = newLm[9].y; const pBot = newLm[2].y; const pChin = newLm[152].y;
            const currentLength = pChin - pTop; const targetWidth = currentLength / 1.618;

            for (let i = 0; i < newLm.length; i++) {
                let pt = newLm[i];
                if (pt.y > pMid) { 
                    const distToCenter = pt.x - fCenter;
                    const targetX = fCenter + (distToCenter * (targetWidth / (w * 0.75))); 
                    pt.x = pt.x + (targetX - pt.x) * k * 0.6; 
                }
                const idealCourtLen = currentLength / 3;
                if (pt.y > pTop && pt.y <= pMid) {
                    let targetY = pTop + ((pt.y - pTop) / (pMid - pTop)) * idealCourtLen;
                    pt.y = pt.y + (targetY - pt.y) * k * 0.3;
                } else if (pt.y > pMid && pt.y <= pBot) {
                    let targetY = (pTop + idealCourtLen) + ((pt.y - pMid) / (pBot - pMid)) * idealCourtLen;
                    pt.y = pt.y + (targetY - pt.y) * k * 0.3;
                } else if (pt.y > pBot) {
                    let targetY = (pTop + idealCourtLen * 2) + ((pt.y - pBot) / (pChin - pBot)) * idealCourtLen;
                    pt.y = pt.y + (targetY - pt.y) * k * 0.3;
                }
            }
            return newLm;
        }

        function drawMeshDeformation(ctx, origCanvas, origLm, targetLm, w, h) {
            const rows = 12; const cols = 10;
            ctx.clearRect(0, 0, w, h);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const srcX1 = (c / cols) * w; const srcY1 = (r / rows) * h;
                    const srcX2 = ((c + 1) / cols) * w; const srcY2 = ((r + 1) / rows) * h;

                    const getOffset = (sx, sy) => {
                        let nearestIdx = 1; let minDist = Infinity;
                        [10,152,234,454,1,9,2].forEach(idx => {
                            let d = Math.hypot(origLm[idx].x*w - sx, origLm[idx].y*h - sy);
                            if(d < minDist) { minDist = d; nearestIdx = idx; }
                        });
                        const weight = Math.max(0, 1 - (minDist / 150));
                        return { x: sx + (targetLm[nearestIdx].x - origLm[nearestIdx].x * w) * weight, y: sy + (targetLm[nearestIdx].y - origLm[nearestIdx].y * h) * weight };
                    };

                    const p1 = getOffset(srcX1, srcY1); const p2 = getOffset(srcX2, srcY1);
                    const p3 = getOffset(srcX1, srcY2); const p4 = getOffset(srcX2, srcY2);

                    ctx.save(); ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.clip();
                    const t1 = (p2.x - p1.x) / (srcX2 - srcX1); const t2 = (p2.y - p1.y) / (srcX2 - srcX1);
                    const t3 = (p3.x - p1.x) / (srcY2 - srcY1); const t4 = (p3.y - p1.y) / (srcY2 - srcY1);
                    ctx.transform(t1, t2, t3, t4, p1.x - srcX1 * t1 - srcY1 * t3, p1.y - srcX1 * t2 - srcY1 * t4);
                    ctx.drawImage(origCanvas, 0, 0); ctx.restore();

                    ctx.save(); ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p4.x, p4.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.clip();
                    const t1b = (p4.x - p3.x) / (srcX2 - srcX1); const t2b = (p4.y - p3.y) / (srcX2 - srcX1);
                    const t3b = (p4.x - p2.x) / (srcY2 - srcY1); const t4b = (p4.y - p2.y) / (srcY2 - srcY1);
                    ctx.transform(t1b, t2b, t3b, t4b, p3.x - srcX1 * t1b - srcY2 * t3b, p3.y - srcX1 * t2b - srcY2 * t4b);
                    ctx.drawImage(origCanvas, 0, 0); ctx.restore();
                }
            }
        }

        function applyEditEffects() {
            if (!capturedCanvasBackup) return;
            const w = canvasEdit.width; const h = canvasEdit.height;
            ctxEdit.clearRect(0,0,w,h); ctxEdit.drawImage(capturedCanvasBackup, 0,0);
            if (!faceLandmarksData) return;

            const whitVal = parseInt(document.getElementById('slider-whiten').value);
            if (whitVal > 0) {
                ctxEdit.save(); ctxEdit.globalCompositeOperation = 'color-dash';
                ctxEdit.fillStyle = `rgba(255,255,255,${whitVal/300})`; ctxEdit.fillRect(0,0,w,h); ctxEdit.restore();
            }
            const smooVal = parseInt(document.getElementById('slider-smooth-val').value);
            if (smooVal > 0) {
                ctxEdit.save(); ctxEdit.globalAlpha = 0.15 * (smooVal/100); ctxEdit.shadowBlur = 10; ctxEdit.shadowColor = "#fff"; ctxEdit.drawImage(canvasEdit, 0,0); ctxEdit.restore();
            }

            drawThemedMakeup(ctxEdit, faceLandmarksData, w, h);

            if (currentSticker !== 'none') {
                const conf = stickerConfig[currentSticker];
                ctxEdit.save(); ctxEdit.translate(stickerState.x, stickerState.y);
                ctxEdit.font = `${conf.size * stickerState.scale}px Arial`; ctxEdit.textAlign = 'center'; ctxEdit.textBaseline = 'middle';
                ctxEdit.fillText(conf.text, 0, 0); ctxEdit.restore();
            }
        }

        function drawThemedMakeup(ctx, lm, w, h) {
            if (currentMakeup === 'none') return;
            ctx.save();
            // 因鏡像翻轉，後製點位 x 軸做對稱鏡像
            const getX = (idx) => (1 - lm[idx].x) * w;
            if (currentMakeup === 'kr') {
                ctx.fillStyle = "rgba(255, 100, 130, 0.35)"; ctx.beginPath(); [61,146,91,181,84,17,314,405,321,375,291].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
            } else if (currentMakeup === 'jp') {
                ctx.fillStyle = "rgba(255, 120, 120, 0.2)";
                ctx.beginPath(); ctx.arc(getX(31), lm[31].y*h+8, 15, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(getX(261), lm[261].y*h+8, 15, 0, Math.PI*2); ctx.fill();
            } else if (currentMakeup === 'opera') {
                ctx.fillStyle = "rgba(230, 0, 40, 0.5)";
                ctx.beginPath(); [70,156,157,33,113].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.beginPath(); [300,383,384,263,342].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
            }
            ctx.restore();
        }

        function initStickerMobileDrag() {
            canvasEdit.addEventListener('touchstart', (e) => {
                if (currentSticker === 'none') return;
                let t = e.touches[0]; let rect = canvasEdit.getBoundingClientRect();
                let canvasX = t.clientX - rect.left; let canvasY = t.clientY - rect.top;
                if (Math.hypot(canvasX - stickerState.x, canvasY - stickerState.y) < 50) {
                    isDragging = true; dragStartX = canvasX; dragStartY = canvasY;
                    initStickerX = stickerState.x; initStickerY = stickerState.y;
                }
            });
            canvasEdit.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    let t = e.touches[0]; let rect = canvasEdit.getBoundingClientRect();
                    stickerState.x = initStickerX + ((t.clientX - rect.left) - dragStartX);
                    stickerState.y = initStickerY + ((t.clientY - rect.top) - dragStartY);
                    applyEditEffects();
                }
            });
            window.addEventListener('touchend', () => isDragging = false);
        }

        function savePhoto() { alert("🎉 照片已完美儲存！"); }
    </script>
