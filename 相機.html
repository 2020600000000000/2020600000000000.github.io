<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>美顏App 完整版</title>

<style>
body{margin:0;background:black;font-family:sans-serif;}

#cameraView,#editorView{
  position:absolute;
  width:100%;
  height:100%;
}

video,canvas{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 拍照按鈕 */
#snapBtn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:15px;
  font-size:18px;
}

/* UI */
#ui{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  color:white;
}

button{padding:10px;margin:5px;}
input{width:200px;}

#editorView{display:none;}
</style>
</head>

<body>

<!-- 📷 CAMERA -->
<div id="cameraView">
  <video id="video" autoplay playsinline></video>
  <button id="snapBtn">📸 拍照</button>
</div>

<!-- 🎨 EDITOR -->
<div id="editorView">
  <canvas id="canvas"></canvas>

  <div id="ui">
    ✨ 美顏強度
    <input id="slider" type="range" min="0" max="1" step="0.01" value="0.5">
    <button id="backBtn">🔙 重拍</button>
  </div>
</div>

<!-- FaceMesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const cameraView=document.getElementById("cameraView");
const editorView=document.getElementById("editorView");

const slider=document.getElementById("slider");

let face=null;
let originalImage=null;

// =====================
// 📷 camera
// =====================
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  video.srcObject=stream;
});

// =====================
// 🤖 FaceMesh
// =====================
const fm=new FaceMesh({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});

fm.setOptions({
  maxNumFaces:1,
  refineLandmarks:true
});

fm.onResults(r=>{
  if(r.multiFaceLandmarks?.length){
    face=r.multiFaceLandmarks[0];
  }
});

// camera feed to FaceMesh
const cam=new Camera(video,{
  onFrame:async()=>{
    await fm.send({image:video});
  },
  width:640,
  height:480
});
cam.start();

// =====================
// 📸 拍照 + 切頁
// =====================
document.getElementById("snapBtn").onclick=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  originalImage=ctx.getImageData(0,0,canvas.width,canvas.height);

  cameraView.style.display="none";
  editorView.style.display="block";

  render();
};

// =====================
// 🎯 臉範圍（正確）
// =====================
function inFace(x,y,w,h){
  if(!face) return false;

  let xs=face.map(p=>p.x*w);
  let ys=face.map(p=>p.y*h);

  let minX=Math.min(...xs);
  let maxX=Math.max(...xs);
  let minY=Math.min(...ys);
  let maxY=Math.max(...ys);

  // 脖子
  maxY += (maxY-minY)*0.6;

  return (x>=minX && x<=maxX && y>=minY && y<=maxY);
}

// =====================
// 🌸 膚色判斷（穩定版）
// =====================
function isSkin(r,g,b){
  return (
    r>60 &&
    g>40 &&
    b>30 &&
    Math.abs(r-g)<30 &&
    r>b
  );
}

// =====================
// ✨ 修圖核心（完整）
// =====================
function render(){

  if(!originalImage) return;

  let t=parseFloat(slider.value);

  let img=new ImageData(
    new Uint8ClampedArray(originalImage.data),
    canvas.width,
    canvas.height
  );

  let d=img.data;

  for(let y=0;y<canvas.height;y+=2){
    for(let x=0;x<canvas.width;x+=2){

      let i=(y*canvas.width+x)*4;

      if(!inFace(x,y,canvas.width,canvas.height)) continue;

      let r=d[i];
      let g=d[i+1];
      let b=d[i+2];

      if(!isSkin(r,g,b)) continue;

      // 🌸 柔和膚色融合（不糊臉）
      d[i]   = r + (255-r)*t;
      d[i+1] = g + (235-g)*t;
      d[i+2] = b + (238-b)*t;
    }
  }

  ctx.putImageData(img,0,0);
}

// slider 即時更新
slider.oninput=render;

// =====================
// 🔙 重拍
// =====================
document.getElementById("backBtn").onclick=()=>{
  editorView.style.display="none";
  cameraView.style.display="block";
};

</script>

</body>
</html>
