<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>美顏App（單檔版）</title>

<style>
body { margin:0; background:black; font-family:sans-serif; }

/* ===== Camera ===== */
#cameraPage, #editorPage {
  position:absolute;
  width:100%;
  height:100%;
}

video, canvas {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* UI */
#snapBtn {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:15px;
  font-size:18px;
}

#ui {
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  color:white;
}

button, input { margin:5px; padding:10px; }

/* hide editor first */
#editorPage { display:none; }
</style>
</head>

<body>

<!-- ================= CAMERA PAGE ================= -->
<div id="cameraPage">
  <video id="video" autoplay playsinline></video>
  <button id="snapBtn">📸 拍照</button>
</div>

<!-- ================= EDITOR PAGE ================= -->
<div id="editorPage">
  <canvas id="canvas"></canvas>

  <div id="ui">
    ✨ 美顏強度
    <input id="slider" type="range" min="0" max="1" step="0.01" value="0.5">
    <button id="backBtn">🔙 返回拍照</button>
  </div>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const cameraPage=document.getElementById("cameraPage");
const editorPage=document.getElementById("editorPage");

const slider=document.getElementById("slider");

// ================= CAMERA =================
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  video.srcObject=stream;
});

// 📸 拍照 → 切頁
document.getElementById("snapBtn").onclick=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  cameraPage.style.display="none";
  editorPage.style.display="block";
};

// ================= SKIN TONE =================
const target=[255,235,238];

function isSkin(r,g,b){
  return r>60 && g>40 && b>30;
}

function apply(){
  let t=parseFloat(slider.value);

  let img=ctx.getImageData(0,0,canvas.width,canvas.height);
  let d=img.data;

  for(let i=0;i<d.length;i+=4){

    let r=d[i],g=d[i+1],b=d[i+2];

    if(isSkin(r,g,b)){
      d[i]=r+(target[0]-r)*t;
      d[i+1]=g+(target[1]-g)*t;
      d[i+2]=b+(target[2]-b)*t;
    }
  }

  ctx.putImageData(img,0,0);
}

// 🎚 即時調整
slider.oninput=()=>{
  ctx.drawImage(canvas,0,0);
  apply();
};

// 🔙 回拍照
document.getElementById("backBtn").onclick=()=>{
  editorPage.style.display="none";
  cameraPage.style.display="block";
};
</script>

</body>
</html>
