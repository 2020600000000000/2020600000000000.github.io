<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 古典美學重塑相機 - 終極手勢整合版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* 歡迎頁面 */
        .intro-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; padding: 30px; text-align: center; background: #1c1c1e; position: absolute; z-index: 100; }
        .intro-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .intro-desc { font-size: 13px; color: #aeaeb2; margin-bottom: 30px; line-height: 1.6; text-align: left; background: #2c2c2e; padding: 15px; border-radius: 12px; }
        .start-btn { background-color: #0071e3; color: #fff; border: none; padding: 16px 50px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; }

        /* 拍照畫面 */
        .camera-stage { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; position: relative; }
        .status-top { width: 90%; text-align: center; padding: 10px; font-size: 14px; color: #fff; background: rgba(0,0,0,0.85); position: absolute; top: 15px; z-index: 60; font-weight: bold; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .viewfinders-split { width: 100vw; height: 58vh; display: flex; flex-direction: row; gap: 4px; background: #000; padding: 4px; box-sizing: border-box; position: relative; }
        .viewfinder-box { flex: 1; height: 100%; position: relative; background: #1c1c1e; border-radius: 12px; overflow: hidden; }
        .viewfinder-box canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder-label { position: absolute; z-index: 10; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; }

        /* 控制面板 */
        .control-panel { width: 100vw; height: 42vh; background: #121212; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 15px; gap: 15px; }
        .filter-indicator { font-size: 13px; background: #2c2c2e; padding: 5px 15px; border-radius: 20px; color: #fff; font-weight: bold; }
        
        .filter-scroll-container { width: 100%; display: flex; gap: 12px; overflow-x: auto; padding: 5px; }
        .filter-scroll-container::-webkit-scrollbar { display: none; }
        .filter-thumb-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 0 0 auto; cursor: pointer; }
        .filter-circle-preview { width: 68px; height: 68px; border-radius: 50%; background: #2c2c2e; border: 3px solid transparent; overflow: hidden; position: relative; }
        .filter-circle-preview canvas { width: 100%; height: 100%; object-fit: cover; }
        .filter-thumb-item.active .filter-circle-preview { border-color: #0071e3; transform: scale(1.08); }
        .filter-thumb-name { font-size: 11px; color: #8e8e93; }
        .gesture-tips { font-size: 12px; color: #ff9500; text-align: center; font-weight: bold; padding: 0 10px; line-height: 1.4; }

        /* 修圖編輯頁面 */
        .edit-stage { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; background: #1c1c1e; overflow-y: auto; padding: 15px; }
        .preview-box { width: 100%; max-width: 360px; aspect-ratio: 4/5; background-color: #000; border-radius: 14px; margin-bottom: 15px; position: relative; overflow: hidden; touch-action: none; }
        .preview-box canvas { width: 100%; height: 100%; display: block; background: #000; border: 1px solid rgba(255,255,255,0.1); }
        
        .menu-row { display: flex; gap: 6px; overflow-x: auto; width: 100%; padding: 5px 0; margin-bottom: 10px; }
        .menu-row::-webkit-scrollbar { display: none; }
        .btn-item { flex: 0 0 auto; padding: 10px 16px; background-color: #2c2c2e; border-radius: 20px; font-size: 13px; font-weight: bold; border: none; color: #fff; }
        .btn-item.active { background-color: #0071e3; }
        
        .sub-panel { width: 100%; display: none; flex-direction: column; align-items: center; background: #2c2c2e; padding: 15px; border-radius: 14px; margin-bottom: 15px; }
        .slider-container { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .slider-input { width: 100%; height: 6px; background: #48484a; border-radius: 3px; -webkit-appearance: none; margin: 10px 0; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #0071e3; }
        
        .grid-layout { display: flex; gap: 10px; overflow-x: auto; width: 100%; padding: 5px 0; }
        .grid-layout::-webkit-scrollbar { display: none; }
        
        .img-thumb-btn { flex: 0 0 auto; width: 65px; height: 65px; border-radius: 50%; border: 3px solid transparent; background-color: #3a3a3c; overflow: hidden; cursor: pointer; padding: 0; display: flex; justify-content: center; align-items: center; }
        .img-thumb-btn img { width: 100%; height: 100%; object-fit: cover; }
        .img-thumb-btn.active { border-color: #0071e3; transform: scale(1.05); }

        .ratio-toggle-btn { background-color: #ff9500; color: white; width: 100%; max-width: 280px; padding: 12px; border-radius: 20px; font-weight: bold; border: none; margin-bottom: 10px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .ratio-toggle-btn.active { background-color: #34c759; box-shadow: 0 0 10px #34c759; }
        .confirm-btn { width: 100%; max-width: 280px; padding: 14px; background-color: #34c759; color: white; border-radius: 25px; text-align: center; font-weight: bold; border: none; font-size: 16px; margin-top: 5px; }
        
        #hidden-assets { display: none; }
        #hidden-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay playsinline muted></video>

    <div id="hidden-assets">
        <img id="asset-mk-jp" src="日式.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='日式.png'">
        <img id="asset-mk-opera" src="歌仔戲.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='歌仔戲.png'">
        <img id="asset-stk-5188" src="IMG_5188.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5188.png'">
        <img id="asset-stk-5189" src="IMG_5189.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5189.png'">
        <img id="asset-stk-5190" src="IMG_5190.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5190.png'">
        <img id="asset-stk-5191" src="IMG_5191.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5191.png'">
        <img id="asset-stk-5192" src="IMG_5192.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5192.png'">
        <img id="asset-stk-5193" src="IMG_5193.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5193.png'">
        <img id="asset-stk-5194" src="IMG_5194.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5194.png'">
        <img id="asset-stk-5195" src="IMG_5195.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5195.png'">
        <img id="asset-stk-5196" src="IMG_5196.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5196.png'">
        <img id="asset-stk-5197" src="IMG_5197.PNG" onload="if(typeof applyEditEffects === 'function') applyEditEffects();" onerror="this.src='IMG_5197.png'">
    </div>

    <div id="stage-intro" class="intro-stage">
        <div class="intro-title">AI 古典美學重塑相機</div>
        <div class="intro-desc">
            <b>【🔥 互動手勢流全面整合版】</b><br>
            1. <b>👋 揮手換濾鏡：</b> 鏡頭前將手腕移至最左或最右即可秒切濾鏡！<br>
            2. <b>👌 比 OK 倒數拍照：</b> 擺出 OK 手勢，立刻觸發 5 秒快門，自動捕捉畫面！<br>
            3. <b>✨ 後製多點觸控：</b> 精準美白、智慧磨皮、臉部重塑外，貼紙更支援雙指縮放與旋轉！
        </div>
        <button class="start-btn" onclick="enterCameraStage()">開啟相機</button>
    </div>

    <div id="stage-capture" class="camera-stage">
        <div id="status-text" class="status-top">⚙️ 正在啟動鏡頭與手勢偵測...</div>
        <div class="viewfinders-split">
            <div class="viewfinder-box">
                <canvas id="canvas-raw"></canvas>
                <div class="viewfinder-label">📷 原始畫面</div>
            </div>
            <div class="viewfinder-box">
                 <canvas id="canvas-live-fx"></canvas>
                <div class="viewfinder-label">✨ 即時預覽 (揮手換濾鏡)</div>
            </div>
        </div>
        <div class="control-panel">
            <div class="filter-indicator" id="filter-name">目前濾鏡：原圖</div>
            <div class="filter-scroll-container" id="filter-bar"></div>
            <div class="gesture-tips">🔥 互動指令：手腕移至最左/最右側可切換濾鏡；對鏡頭擺出「👌 OK手勢」觸發 5 秒快門拍照。</div>
        </div>
    </div>

    <div id="stage-edit" class="edit-stage">
        <div class="preview-box" id="preview-container">
            <canvas id="canvas-edit-preview"></canvas>
        </div>

        <button id="btn-toggle-ratio" class="ratio-toggle-btn" onclick="toggleGoldenRatioMask()">📐 啟動黃金比例五官臉型重塑</button>
        
        <div class="menu-row">
            <button class="btn-item active" id="btn-skin" onclick="openSubPanel('skin')">✨ 精準美白</button>
            <button class="btn-item" id="btn-smooth" onclick="openSubPanel('smooth')">⏳ 智慧磨皮</button>
            <button class="btn-item" id="btn-makeup" onclick="openSubPanel('makeup')">💄 主題妝容</button>
            <button class="btn-item" id="btn-sticker" onclick="openSubPanel('sticker')">🎉 專屬貼紙</button>
        </div>

        <div id="panel-skin" class="sub-panel">
            <div class="slider-container">
                <span style="font-size:12px;">精準美白強度 (曲線調校，保留五官立體感)</span>
                <input type="range" id="slider-whiten" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
        </div>
        <div id="panel-smooth" class="sub-panel">
             <div class="slider-container">
                 <span style="font-size:12px;">智慧磨皮平滑度 (全域核心偏移平滑肌膚)</span>
                <input type="range" id="slider-smooth-val" class="slider-input" min="0" max="100" value="0" oninput="applyEditEffects()">
            </div>
        </div>
        <div id="panel-makeup" class="sub-panel">
            <div class="grid-layout">
                <button class="img-thumb-btn mk-btn active" id="mk-none" onclick="setMakeup('none')" style="color:#fff; font-size:11px; font-weight:bold;">無妝容</button>
                <button class="img-thumb-btn mk-btn" id="mk-jp" onclick="setMakeup('jp')"><img src="日式.PNG" onerror="this.src='日式.png'"></button>
                <button class="img-thumb-btn mk-btn" id="mk-opera" onclick="setMakeup('opera')"><img src="歌仔戲.PNG" onerror="this.src='歌仔戲.png'"></button>
            </div>
        </div>
        <div id="panel-sticker" class="sub-panel">
            <div class="grid-layout" id="sticker-thumb-container">
                <button class="img-thumb-btn stk-btn active" id="stk-none" onclick="setSticker('none')" style="color:#fff; font-size:11px; font-weight:bold;">無貼紙</button>
            </div>
        </div>

        <button class="confirm-btn" onclick="savePhoto()">💾 儲存相簿</button>
    </div>

    <script>
        const videoElement = document.getElementById('hidden-video');
        const canvasRaw = document.getElementById('canvas-raw');
        const canvasLiveFx = document.getElementById('canvas-live-fx');
        const canvasEdit = document.getElementById('canvas-edit-preview');
        
        const ctxRaw = canvasRaw.getContext('2d');
        const ctxLive = canvasLiveFx.getContext('2d');
        const ctxEdit = canvasEdit.getContext('2d');

        let currentFilterIndex = 0;
        const filters = ['none', 'grayscale(100%)', 'sepia(80%)', 'contrast(150%)', 'hue-rotate(90deg)'];
        const filterLabelMap = ['原圖', '黑白極簡', '復古琥珀', '高對比戲劇', '奇幻色相'];
        
        let frozenFaceLandmarks = null; 
        let showGoldenRatioWarp = false;  
        let isCountingDown = false; 
        let countdownTimer = null;
        let originalSnapshot = document.createElement('canvas');
        
        let currentMakeup = 'none';
        let currentSticker = 'none';
        let hands = null;
        let faceMeshStatic = null;
        let cameraUtilsInstance = null;

        // 全域建立快取畫布池 [cite: 48]
        let pBaseCanvas = document.createElement('canvas');
        let pBaseCtx = pBaseCanvas.getContext('2d');
        let fxCanvas = document.createElement('canvas');
        let fxCtx = fxCanvas.getContext('2d');
        let maskCanvas = document.createElement('canvas');
        let maskCtx = maskCanvas.getContext('2d');
        let blendCanvas = document.createElement('canvas');
        let blendCtx = blendCanvas.getContext('2d');

        const stickerIds = ['5188', '5189', '5190', '5191', '5192', '5193', '5194', '5195', '5196', '5197'];
        let stickerState = { x: 180, y: 225, scale: 1.0, angle: 0, width: 140, height: 140 }; [cite: 51]
        
        // 拖曳與手勢狀態變數 [cite: 52, 53]
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let initStickerX = 0, initStickerY = 0;
        let startTouchDist = 0, startTouchAngle = 0, initScale = 1.0, initAngle = 0;
        
        const CW = 360;
        const CH = 630;
        let isCameraActive = false;
        let waveCooldown = false;

        function init() {
            canvasRaw.width = CW;
            canvasRaw.height = CH;
            canvasLiveFx.width = CW;
            canvasLiveFx.height = CH;
            canvasEdit.width = 360;
            canvasEdit.height = 450;
            originalSnapshot.width = 360;
            originalSnapshot.height = 450;
            pBaseCanvas.width = 360;
            pBaseCanvas.height = 450;
            fxCanvas.width = 360;
            fxCanvas.height = 450;
            maskCanvas.width = 360;
            maskCanvas.height = 450;
            blendCanvas.width = 360;
            blendCanvas.height = 450;
            
            buildFilterScrollThumbs();
            buildStickerThumbMenu();
            initStickerMobileDrag(); // 啟用貼紙手勢
        }

        function buildStickerThumbMenu() {
            const container = document.getElementById('sticker-thumb-container');
            stickerIds.forEach(id => {
                const btn = document.createElement('button');
                btn.className = 'img-thumb-btn stk-btn';
                btn.id = `stk-${id}`;
                btn.onclick = () => setSticker(id);
                const thumbImg = document.createElement('img');
                thumbImg.src = `IMG_${id}.PNG`;
                thumbImg.onerror = () => { thumbImg.src = `IMG_${id}.png`; };
                btn.appendChild(thumbImg);
                container.appendChild(btn);
            });
        }

        function buildFilterScrollThumbs() {
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = '';
            filters.forEach((cssFilter, idx) => {
                const item = document.createElement('div');
                item.className = `filter-thumb-item ${idx === 0 ? 'active' : ''}`;
                item.id = `thumb-item-${idx}`;
                item.onclick = () => selectFilterByIndex(idx);

                const circle = document.createElement('div');
                circle.className = 'filter-circle-preview';
                circle.style.filter = cssFilter;

                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.id = `thumb-canvas-${idx}`;
                thumbCanvas.width = 80;
                thumbCanvas.height = 80;
                circle.appendChild(thumbCanvas);

                const label = document.createElement('div');
                label.className = 'filter-thumb-name';
                label.innerText = filterLabelMap[idx];

                item.appendChild(circle);
                item.appendChild(label);
                bar.appendChild(item);
            });
        }

        function selectFilterByIndex(idx) {
            currentFilterIndex = idx;
            document.getElementById('filter-name').innerText = `目前濾鏡：${filterLabelMap[idx]}`;
            for (let i = 0; i < filters.length; i++) {
                const item = document.getElementById(`thumb-item-${i}`);
                if (item) item.classList.toggle('active', i === idx);
            }
        }

        function enterCameraStage() {
            document.getElementById('stage-intro').style.display = 'none';
            document.getElementById('stage-capture').style.display = 'flex';
            isCameraActive = true;
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 480, height: 640 } })
            .then(stream => {
                videoElement.srcObject = stream;
                cameraUtilsInstance = new Camera(videoElement, {
                    onFrame: async () => {
                        if (!isCameraActive) return;
                        ctxRaw.save();
                        ctxRaw.clearRect(0,0,CW,CH);
                        ctxRaw.translate(CW, 0);
                        ctxRaw.scale(-1, 1);
                        ctxRaw.drawImage(videoElement, 0, 0, CW, CH);
                        ctxRaw.restore();

                        ctxLive.save();
                        ctxLive.clearRect(0,0,CW,CH);
                        ctxLive.filter = filters[currentFilterIndex];
                        ctxLive.drawImage(canvasRaw, 0, 0, CW, CH);
                        ctxLive.restore();

                        updateFilterThumbsPreview();

                        if (hands) await hands.send({ image: videoElement });
                    },
                    width: 480,
                    height: 640
                });
                cameraUtilsInstance.start();
                initMediaPipeObjects();
            })
            .catch(err => {
                document.getElementById('status-text').innerText = "❌ 無法啟動相機: " + err.message;
            });
        }

        function updateFilterThumbsPreview() {
            for (let i = 0; i < filters.length; i++) {
                const tcv = document.getElementById(`thumb-canvas-${i}`);
                if (tcv) {
                    const tctx = tcv.getContext('2d');
                    tctx.drawImage(canvasRaw, 0, 0, tcv.width, tcv.height);
                }
            }
        }

        function initMediaPipeObjects() {
            document.getElementById('status-text').innerText = "⏳ 正在載入 AI 互動手勢引擎...";
            
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(onHandResultsMatrix);

            faceMeshStatic = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            faceMeshStatic.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMeshStatic.onResults(onStaticFaceResults);
            
            setTimeout(() => {
                if (isCameraActive) document.getElementById('status-text').innerText = "👋 隔空操控已就緒！比 OK 拍照 / 左右揮手換濾鏡";
            }, 2000);
        }

        function onHandResultsMatrix(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;
            const lm = results.multiHandLandmarks[0];
            
            // 1. 偵測揮手換濾鏡 (利用手腕 X 座標座標轉換)
            const wristX = lm[0].x; 
            if (!waveCooldown) {
                if (wristX < 0.15) { 
                    waveCooldown = true;
                    currentFilterIndex = (currentFilterIndex + 1) % filters.length;
                    selectFilterByIndex(currentFilterIndex);
                    setTimeout(() => { waveCooldown = false; }, 800);
                } else if (wristX > 0.85) { 
                    waveCooldown = true;
                    currentFilterIndex = (currentFilterIndex - 1 + filters.length) % filters.length;
                    selectFilterByIndex(currentFilterIndex);
                    setTimeout(() => { waveCooldown = false; }, 800);
                }
            }

            // 2. 偵測 OK 手勢 (大拇指與食指捏合)
            const dx = lm[4].x - lm[8].x;
            const dy = lm[4].y - lm[8].y;
            const dist = Math.hypot(dx, dy);
            if (dist < 0.035 && !isCountingDown) {
                triggerSnapshotCountdown();
            }
        }

        function triggerSnapshotCountdown() {
            isCountingDown = true;
            let counter = 5;
            document.getElementById('status-text').innerText = `📸 OK 手勢觸發！倒數 ${counter} 秒...`;
            
            countdownTimer = setInterval(() => {
                counter--;
                if (counter > 0) {
                    document.getElementById('status-text').innerText = `📸 OK 手勢觸發！倒數 ${counter} 秒...`;
                } else {
                    clearInterval(countdownTimer);
                    executeCaptureAction();
                }
            }, 1000);
        }

        function executeCaptureAction() {
            isCameraActive = false;
            if (cameraUtilsInstance) cameraUtilsInstance.stop();
            document.getElementById('status-text').innerText = "✨ 正在進行古典美學重塑校準...";

            // 裁剪中間 4:5 區域至原圖快取
            const sWidth = CW;
            const sHeight = CW * (5 / 4);
            const sx = 0;
            const sy = (CH - sHeight) / 2;

            const octx = originalSnapshot.getContext('2d');
            octx.clearRect(0,0,360,450);
            octx.drawImage(canvasLiveFx, sx, sy, sWidth, sHeight, 0, 0, 360, 450);

            faceMeshStatic.send({ image: originalSnapshot }).then(() => {
                document.getElementById('stage-capture').style.display = 'none';
                document.getElementById('stage-edit').style.display = 'flex';
                openSubPanel('skin');
                applyEditEffects();
            });
        }

        function onStaticFaceResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                frozenFaceLandmarks = results.multiFaceLandmarks[0];
            } else {
                frozenFaceLandmarks = null;
            }
        }

        // 核心渲染修復：36組全臉幾何變形演算法
        function applyEditEffects() {
            ctxEdit.clearRect(0,0,360,450);
            
            pBaseCtx.clearRect(0,0,360,450);
            pBaseCtx.drawImage(originalSnapshot, 0, 0, 360, 450);

            let whitenVal = parseInt(document.getElementById('slider-whiten').value);
            if (whitenVal > 0) {
                pBaseCtx.save();
                pBaseCtx.globalCompositeOperation = 'soft-light';
                pBaseCtx.fillStyle = `rgba(255,255,255,${whitenVal / 180})`;
                pBaseCtx.fillRect(0,0,360,450);
                pBaseCtx.restore();
            }

            let smoothVal = parseInt(document.getElementById('slider-smooth-val').value);
            if (smoothVal > 0) {
                let radius = (smoothVal / 100) * 4;
                pBaseCtx.save();
                pBaseCtx.globalAlpha = smoothVal / 130;
                pBaseCtx.filter = `blur(${radius}px)`;
                pBaseCtx.drawImage(pBaseCanvas, 0,0);
                pBaseCtx.restore();
            }

            fxCtx.clearRect(0,0,360,450);
            fxCtx.drawImage(pBaseCanvas, 0, 0);

            if (showGoldenRatioWarp && frozenFaceLandmarks) {
                performWarpMesh36(fxCtx, pBaseCanvas, frozenFaceLandmarks);
            }

            ctxEdit.drawImage(fxCanvas, 0, 0);

            if (frozenFaceLandmarks) {
                renderAdvancedMakeup(ctxEdit, frozenFaceLandmarks);
            }

            if (currentSticker !== 'none') {
                const stkImg = document.getElementById(`asset-stk-${currentSticker}`);
                if (stkImg && stkImg.complete && stkImg.naturalWidth > 0) {
                    ctxEdit.save();
                    ctxEdit.translate(stickerState.x, stickerState.y);
                    ctxEdit.rotate(stickerState.angle);
                    ctxEdit.drawImage(stkImg, -stickerState.width*stickerState.scale/2, -stickerState.height*stickerState.scale/2, stickerState.width*stickerState.scale, stickerState.height*stickerState.scale);
                    ctxEdit.restore();
                }
            }
        }

        function performWarpMesh36(targetCtx, srcCanvas, lm) {
            const w = 360, h = 450;
            function getPt(i) { return { x: lm[i].x * w, y: lm[i].y * h }; }
            
            const pC = getPt(4);   
            const pL = getPt(147); 
            const pR = getPt(376); 
            const pB = getPt(152); 

            targetCtx.clearRect(0, 0, w, h);
            targetCtx.drawImage(srcCanvas, 0, 0);

            const steps = 12;
            for (let i = 0; i < steps; i++) {
                let t1 = i / steps;
                let t2 = (i + 1) / steps;
                
                let sliceY1 = pL.y + (pB.y - pL.y) * t1;
                let sliceY2 = pL.y + (pB.y - pL.y) * t2;
                if (sliceY2 > h) sliceY2 = h;
                let sliceH = sliceY2 - sliceY1;
                if (sliceH <= 0) continue;

                let scale = 1.0 - (Math.sin(t1 * Math.PI) * 0.11);
                let sw = w * scale;
                let sx = (w - sw) / 2;

                targetCtx.save();
                targetCtx.beginPath();
                targetCtx.rect(0, sliceY1, w, sliceH);
                targetCtx.clip();
                targetCtx.drawImage(srcCanvas, 0, sliceY1, w, sliceH, sx, sliceY1, sw, sliceH);
                targetCtx.restore();
            }
        }

        function renderAdvancedMakeup(ctx, lm) {
            const w = 360, h = 450;
            function getX(i) { return lm[i].x * w; }
            
            if (currentMakeup === 'jp') {
                ctx.save();
                ctx.fillStyle = "rgba(255,100,120,0.22)";
                ctx.beginPath(); [33,113,124,244,113].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.beginPath(); [300,383,384,263,342].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.restore();
            } else if (currentMakeup === 'opera') {
                ctx.save();
                ctx.fillStyle = "rgba(230,10,40,0.45)";
                ctx.beginPath(); [70,63,105,66,107,55].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.beginPath(); [300,293,334,296,336,285].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.beginPath(); [1,2,98,97,2].forEach(i=>ctx.lineTo(getX(i), lm[i].y*h)); ctx.fill();
                ctx.restore();
            }
        }

        // 終極修復：整合多點觸控（滑動、縮放、旋轉）貼紙手勢控制陣列 
        function initStickerMobileDrag() {
            const container = document.getElementById('preview-container');
            
            function getEventCoords(e) {
                let rect = canvasEdit.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            }

            function handleStart(x, y, isMulti = false, dist = 0, angle = 0) {
                if (isMulti) {
                    startTouchDist = dist; startTouchAngle = angle;
                    initScale = stickerState.scale; initAngle = stickerState.angle;
                } else {
                    if (Math.hypot(x - stickerState.x, y - stickerState.y) < 120) {
                        isDragging = true; dragStartX = x; dragStartY = y;
                        initStickerX = stickerState.x; initStickerY = stickerState.y;
                    }
                }
            }

            // 滑鼠事件
            container.addEventListener('mousedown', (e) => {
                if (currentSticker === 'none') return;
                let p = getEventCoords(e); handleStart(p.x, p.y);
            });
            window.addEventListener('mousemove', (e) => {
                if (isDragging && currentSticker !== 'none') {
                    let p = getEventCoords(e);
                    stickerState.x = initStickerX + (p.x - dragStartX);
                    stickerState.y = initStickerY + (p.y - dragStartY);
                    applyEditEffects();
                }
            });
            window.addEventListener('mouseup', () => { isDragging = false; });

            // 雙指多點觸控手勢 
            container.addEventListener('touchstart', (e) => {
                if (currentSticker === 'none') return;
                if (e.touches.length === 1) {
                    let p = getEventCoords(e); handleStart(p.x, p.y); } 
                else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY;
                    handleStart(0, 0, true, Math.hypot(dx, dy), Math.atan2(dy, dx));
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (currentSticker === 'none') return;
                if (isDragging && e.touches.length === 1) {
                    e.preventDefault(); let p = getEventCoords(e);
                    stickerState.x = initStickerX + (p.x - dragStartX); stickerState.y = initStickerY + (p.y - dragStartY); applyEditEffects();
                } else if (e.touches.length === 2) {
                    e.preventDefault(); const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY;
                    stickerState.scale = Math.max(0.3, Math.min(4.0, initScale * (Math.hypot(dx, dy) / startTouchDist)));
                    stickerState.angle = initAngle + (Math.atan2(dy, dx) - startTouchAngle); applyEditEffects();
                }
            }, { passive: false });
            
            container.addEventListener('touchend', () => { isDragging = false; });
        }

        function openSubPanel(panelName) {
            ['skin', 'smooth', 'makeup', 'sticker'].forEach(name => {
                document.getElementById(`panel-${name}`).style.display = (name === panelName) ? 'flex' : 'none';
                document.getElementById(`btn-${name}`).classList.toggle('active', name === panelName);
            });
        }

        function toggleGoldenRatioMask() {
            showGoldenRatioWarp = !showGoldenRatioWarp;
            const btn = document.getElementById('btn-toggle-ratio');
            btn.classList.toggle('active', showGoldenRatioWarp);
            btn.innerText = showGoldenRatioWarp ? "📐 變形中 (再點擊還原)" : "📐 啟動黃金比例五官臉型重塑";
            applyEditEffects();
        }

        function setMakeup(type) {
            currentMakeup = type;
            document.querySelectorAll('.mk-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `mk-${type}`);
            });
            applyEditEffects();
        }

        function setSticker(id) {
            currentSticker = id;
            document.querySelectorAll('.stk-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `stk-${id}`);
            });
            // 置中初始化
            stickerState.x = 180; stickerState.y = 225; stickerState.scale = 1.0; stickerState.angle = 0;
            applyEditEffects();
        }

        function savePhoto() {
            const dataUrl = canvasEdit.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `AI_Aesthetics_Snapshot_${Date.now()}.png`;
            link.href = dataUrl;
            link.click();
        }

        window.onload = init;
    </script>
