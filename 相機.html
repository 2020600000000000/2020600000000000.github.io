<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智慧美白磨皮工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 20px;
        }
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 250px;
        }
        .view-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            min-height: 400px;
            position: relative;
        }
        canvas {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .btn:hover { background-color: #2980b9; }
        .btn-save { background-color: #2ecc71; }
        .btn-save:hover { background-color: #27ae60; }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-weight: 600; font-size: 14px; }
        input[type="file"] { display: none; }
        #status { color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

    <h2>✨ GitHub 線上 AI 美白磨皮修圖工具</h2>
    
    <div class="container">
        <div class="control-panel">
            <label for="upload-input" class="btn">1. 上傳圖片</label>
            <input type="file" id="upload-input" accept="image/*">
            
            <div class="slider-group">
                <label>2. 磨皮強度 (平滑化): <span id="blur-val">0</span></label>
                <input type="range" id="slider-blur" min="0" max="20" value="0">
            </div>
            
            <div class="slider-group">
                <label>3. 美白亮度: <span id="bright-val">0</span></label>
                <input type="range" id="slider-bright" min="0" max="100" value="0">
            </div>

            <button id="btn-save" class="btn btn-save" style="margin-top: 20px;">4. 下載儲存圖片</button>
            <div id="status">目前狀態：等待上傳圖片...</div>
        </div>

        <div class="view-panel" id="view-panel">
            <span id="placeholder-text">圖片預覽區域</span>
            <canvas id="canvas" style="display: none;"></canvas>
        </div>
    </div>

    <script>
        const uploadInput = document.getElementById('upload-input');
        const sliderBlur = document.getElementById('slider-blur');
        const sliderBright = document.getElementById('slider-bright');
        const btnSave = document.getElementById('btn-save');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const placeholderText = document.getElementById('placeholder-text');

        let originalImage = new Image();

        // 監聽圖片上傳
        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        originalImage.onload = () => {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            canvas.style.display = 'block';
            placeholderText.style.display = 'none';
            
            // 重設滑桿
            sliderBlur.value = 0;
            sliderBright.value = 0;
            document.getElementById('blur-val').innerText = '0';
            document.getElementById('bright-val').innerText = '0';
            
            status.innerText = "狀態：圖片載入成功！";
            resetAndDraw();
        };

        // 滑桿事件監聽
        sliderBlur.addEventListener('input', (e) => {
            document.getElementById('blur-val').innerText = e.target.value;
            applyEffects();
        });

        sliderBright.addEventListener('input', (e) => {
            document.getElementById('bright-val').innerText = e.target.value;
            applyEffects();
        });

        function resetAndDraw() {
            ctx.drawImage(originalImage, 0, 0);
        }

        // 核心影像處理（純網頁前端計算）
        function applyEffects() {
            if (!originalImage.src) return;
            status.innerText = "狀態：處理中...";

            // 先畫回原圖
            resetAndDraw();

            const blurVal = parseInt(sliderBlur.value());
            const brightVal = parseInt(sliderBright.value());

            // 取得像素資料
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imgData.data;

            // 1. 亮度美白處理 (利用 HTML Canvas 矩陣)
            if (brightVal > 0) {
                for (let i = 0; i < data.length; i += 4) {
                    data[i]     = Math.min(255, data[i] + brightVal);     // 紅
                    data[i + 1] = Math.min(255, data[i + 1] + brightVal); // 綠
                    data[i + 2] = Math.min(255, data[i + 2] + brightVal); // 藍
                }
            }

            // 2. 磨皮處理（網頁端採用快速高斯平滑近似，確保網頁不卡頓）
            if (blurVal > 0) {
                ctx.putImageData(imgData, 0, 0);
                ctx.filter = `blur(${blurVal / 4}px)`;
                ctx.drawImage(canvas, 0, 0);
                // 恢復濾鏡避免疊加
                ctx.filter = 'none';
            } else {
                ctx.putImageData(imgData, 0, 0);
            }

            status.innerText = "狀態：處理完成";
        }

        // 下載圖片
        btnSave.addEventListener('click', () => {
            if (!originalImage.src) return;
            const link = document.createElement('a');
            link.download = 'ai_beautiful_photo.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
