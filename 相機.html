<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>皮膚美白可調相機</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

video, canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#ui {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  z-index: 10;
  color: white;
}

#slider {
  width: 200px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  ✨ 美白強度
  <input id="slider" type="range" min="0.8" max="1.5" step="0.01" value="1.08">
  <button id="btn">📸 拍照</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🧍 人像分割
const segmentation = new SelfieSegmentation({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
});

segmentation.setOptions({
  modelSelection: 1
});

// 🎯 皮膚判斷
function isSkin(r, g, b) {
  return (
    r > 95 && g > 40 && b > 20 &&
    Math.max(r, g, b) - Math.min(r, g, b) > 15 &&
    r > g && r > b
  );
}

// 🎨 主處理
segmentation.onResults((results) => {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  const maskCanvas = document.createElement("canvas");
  maskCanvas.width = canvas.width;
  maskCanvas.height = canvas.height;

  const maskCtx = maskCanvas.getContext("2d");
  maskCtx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);

  const maskData = maskCtx.getImageData(0, 0, canvas.width, canvas.height).data;

  const strength = parseFloat(slider.value);

  for (let i = 0; i < data.length; i += 4) {

    const isPerson = maskData[i] > 50;
    if (!isPerson) continue;

    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (isSkin(r, g, b)) {
      data[i]     = Math.min(255, r * strength);
      data[i + 1] = Math.min(255, g * strength);
      data[i + 2] = Math.min(255, b * strength);
    }
  }

  ctx.putImageData(imageData, 0, 0);
});

// 📷 相機
const camera = new Camera(video, {
  onFrame: async () => {
    await segmentation.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

// 📸 拍照
document.getElementById("btn").addEventListener("click", () => {
  const link = document.createElement("a");
  link.download = "skin_beauty.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});
</script>

</body>
</html>
